body:
  text: 侍者超祥記録拈古舉世尊初生一手指天一手指地周行七步目顧四方云天上天下唯我獨尊後雲門云我當時若見一棒打殺與狗子喫卻貴圖天下太平拈云釋迦老子無風起浪將謂有多少奇特冷地看來也是頭上安頭雲門正令雖行未免賊過後張弓二老鼻孔俱被慧燈穿卻了也還有為古人雪屈者麼出來與慧燈拄杖子相見舉世尊在靈山會上拈華顧衆百萬人天皆悉罔措唯迦葉尊者破顏微笑世尊云吾以正法眼藏涅槃妙心實相無相微妙法門不立文字教外別傳付囑摩訶迦葉拈云世尊可謂挽千鈞之弩箭不虛發迦葉亦似水無筋骨能載萬乘之舟然雖如是也是將錯就錯趙州路逢一婆子問云甚麼處去婆云偷趙州筍去州云忽遇趙州又作麼生婆與一掌州休去拈云趙州老漢三十年覓馬騎卻被驢子撲雖然暗裏抽橫骨明中坐舌頭也須是者老漢始得浮杯和尚因凌行婆問盡力道不得句分付阿誰杯云浮杯無剩語婆云未到浮杯不妨疑著杯云別有長處不妨拈出婆斂手哭云蒼天中更添冤苦杯無語婆云語不知偏正理不知倒邪為人即禍生後僧舉似南泉泉云苦哉浮杯被者老婆推折一上婆聞笑云王老師猶少機關在時有澄一禪客問婆王老師為甚少機關婆哭云可悲可痛澄一舉似趙州州云我若見者臭老婆問教口啞澄一云未審和尚爭生問他州便打澄一云因甚卻打某甲州云是你者伎死漢不打更待何時婆聞云趙州合喫婆手中棒州聞哭云蒼天蒼天婆聞云趙州眼光爍破四天下州聞令僧問如何是趙州眼婆豎起拳僧回舉似州寄偈云當機覿面提覿面當機疾寄語凌行婆哭聲何得失婆復偈云哭聲師已曉已曉復誰知當時摩竭國幾喪目前機拈云一箇狗走抖擻口一箇猴愁摟搜頭一箇瞎驢趁大隊一箇漆桶夜生光當時慧燈若見好與一坑埋卻貴圖天下太平忽有箇旁不甘底出來道慧燈具甚眼乃能如是但斂手云蒼天蒼天大隨菴側有一龜僧問一切衆生皆皮裹骨者箇衆生因甚骨裹皮師拈草履覆龜背上僧無語拈云大隨和尚拈草履不是好心踏殺者僧三生六十劫翻身不得若是慧燈待問振威一喝管教他皮膚脫落靈雲因見桃華悟道作偈云三年來尋劍客幾回落葉又抽枝自從一見桃華後直至如今更不疑玄沙聞云諦當甚諦當敢保老兄未徹在拈云靈雲平地喫蹎玄沙痛處下針二俱未了山僧恁麼道也是龜毛長三尺玄機女道者常靜於大日山中一日忽念曰自性如如本無去住厭喧取靜豈為達耶乃往參雪峰峰問從甚處來機云大日山峰云日出也未機云若出鎔卻雪峰峰云汝名甚麼機云玄機峰云日織多少機云寸絲不掛便禮拜才行三五步峰召云袈裟角拖地也機回首峰云大好寸絲不掛拈云慧燈有六十棒二十棒打玄機不合龍頭蛇尾二十棒打雪峰不合敶後興兵二十棒慧燈自喫初不干及大衆且道意作麼生具眼者緇素看雪峰問僧近離甚處僧云覆船峰云生死海未度因甚便覆卻船僧無語回舉似覆船船云何不道渠無生死僧再至雪峰舉此語峰云此不是你語僧云是覆船恁麼道峰云我有二十棒寄與覆船二十棒老僧自喫不干闍黎事拈云楊意不逢撫凌雲而自惜鍾期既遇奏流水以何慚雪峰覆船可謂心眼相關矣雖然醫得眼前瘡剜去心頭肉爭奈被者懵懂漢一時勘破且那裏是他勘破二老處莫將尚書謁南堂淨禪師咨決心要堂使其向好處提撕適如廁聞穢氣急以手掩鼻遂有省即說偈曰從來姿韻愛風流幾笑時人向外求萬別千差無覓處得來原在鼻尖頭南堂答曰一法才通法法周縱橫妙用更何求青蛇出匣魔軍伏碧眼胡僧笑點頭拈云莫將尚書向廁坑上得些臭氣便誇大口玷辱宣尼大師不少南堂老漢好與三十拄杖何故不合教壞人家男女僧問雲門如何是佛門云乾矢橛拈云人歸大國方知貴水到瀟湘分外清韶陽老子正所謂見說吳音都變盡語言渾似廣南蠻也然雖如是也是靈龜曳尾東印土國王請般若多羅尊者齊次衆皆轉經尊者宴坐王問曰師何不轉經者曰貧道出息不涉衆緣入息不居陰界常轉如是經百千萬億卷王信入作禮拈云國王請齊不是好心尊者雖善說法要叵耐國王出出入入忙不能已慧燈卻不然他若問何不轉經但鳴指一下云三藏十二部皆從者裏演出若人承虛接響自有國王證明王常侍問僧一切衆生皆有佛性是否僧云是侍指畫上狗子云者箇還有佛性也無僧無語侍自代云看咬著你拈云惜何夫子之說君子也駟不及舌何以故不知者僧卻具陷虎之機令者漢鑽入畜生隊裏吠樁逐塊然雖如是山僧也是為他閒事長無明頌古世尊一日升座文殊白椎云諦觀法王法法王法如是世尊便下座未升座前已漏泄何須開口重宣說銅頭鐵額萬千人盡向文殊椎下折達磨大師見梁武帝帝問如何是聖諦第一義磨云廓然無聖帝云對朕者誰磨云不識帝不契一隻折頭箭直射九重殿廓然如霹靂不識同閃電覿面被活埋至今無人見文殊師利至諸佛集處見一女子近於佛座而入三昧白佛云何此女得近佛坐而我不得世尊云汝但覺此女令從三昧起汝自問之文殊繞女子三匝鳴指一下托至梵天盡其神力而不能出世尊云下方過四十二億恆河沙國土有罔明菩薩能出此定須臾罔明從地湧出佇世尊前世尊敕出女定罔明於女子前鳴指一下女子於是從定而出夢中春色夢中回月裏娑羅月裏垂堪笑罔明與文殊無端失卻兩莖眉法眼因二僧來參眼以手指簾二僧同去捲眼云一得一失指出須彌不是山寒雲深鎖兩重關他家自有通霄路不在層巒疊翠間雲門因僧問如何是諸佛出身處門云東山水上行耳朵兩片皮舌頭一臠肉五五二十五六六三十六雲門因僧問如何是佛法大意門云面南看北斗面南看北斗拈得鼻孔失卻口丈二舌頭著地拖波斯倒拔崑崙走雲門因僧問不是目前機亦非目前事時如何門云倒一說倒一說腦門拔出三斤鐵蟭螟眼裏放風箏無色界天笑落舌別別往往清風吹白月玄沙指地上白點問僧云見麼僧云見沙如是三問僧如是三答沙云你也見我也見因甚麼道不會你也見我也見大似眉間倒挂劍血濺梵天祗如然大冶精金色不變趙州因僧問學人乍入叢林乞師指示州云喫粥了也未僧云喫粥了州云洗鉢盂去其僧有省喫粥了洗鉢去等閒撞折須彌柱咄哉禍事不須言冤入骨髓無雪處曹山問強上座佛真法身猶如虛空應物現形如水中月作麼生是應的道理強云如驢覷井山云道則大煞道祗道得八成強云和尚又如何山云如井覷驢驢覷井井覷驢金毛獅子騎文殊舌頭無骨峭崚峋兩箇鴛鴦一畫圖南泉示衆云馬大師說即心即佛王老師不恁麼道不是心不是佛不是物恁麼道還有過麼趙州禮拜而去出乎類拔乎萃端底泥團是土塊平地無端欺賺人賊子尤能藏父諱德山凡見僧入門便棒入門便棒無風起浪那箇男兒不丈夫何勞特地粧模樣波斯匿王問佛聖義諦中還有世俗諦否若言其無智不應一若言其有智不應二不二之義其義云何世尊云大王汝於過去龍光佛時曾問此義我今無說汝亦無聞無說無聞是名一義二義聖諦俗諦一二義分明直說君休記春來春去華開落揭諦揭諦僧揭諦三聖云我逢人則出出則不為人興化云我逢人則不出出則便為人驢唇輕馬嘴重兩箇啞子同說夢與人方便惹人嫌徒把指頭靴裏弄馬祖因僧問如何是佛祖云即心即佛太煞分明說似君緣何尚自暗沉吟折旋俯仰憑誰力認著猶為影弄人古德垂語云鐘樓上念讚床腳下種菜時如何僧云猛虎當頭踞劍林刀樹眼中栽鐵壁銀山驀面來遍界迥無回避處老胡種族一時埋石頭云恁麼也不得不恁麼也不得恁麼不恁麼總不得開得唇皮意莫窺革囊偏自露針錐橫穿一串金剛子散作禾山打鼓椎趙州因僧問狗子還有佛性也無州云無太阿氣接斗牛光凡聖從來難近傍未道已前筋骨露那堪開口犯鋒芒投子因趙州問大死底人卻活時如何子云不許夜行投明須到石虎踏翻衡嶽去泥牛吸盡洞庭湖全死全活休擬議明暗多來在半途歸宗因僧問如何是佛宗云我向汝道汝還信麼僧云和尚重言安敢不信宗云即汝便是僧云如何保任宗云一翳在眼空華亂墜面門劈破露筋骨突出圓光孤卓卓不得春風華不開華開又避風吹落魯祖面壁一掬冰池冷徹骨皮膚凍裂命難續寒風凜凜更堪悲幾箇於中能下足南嶽讓禪師因馬大師闡化江西師問衆云道一為衆說法否衆云已為衆說法師云總未見持箇消息來衆無對因遣一僧云待伊上堂時但問作麼生伊道底言語記將來僧至一如師旨回謂師云馬師云自從胡亂後三十年不曾少鹽醬喫師然之徹底掀翻透頂過拈來當甚苦胡盧直饒高踏毗盧頂猶是他家田庫奴龍牙參翠微久之一日問云自到法席不蒙示誨意在於何微云嫌甚麼又問洞山山云爭怪得老僧法眼別云祖師來也嫌甚麼可憐生無限平人被陸沉心不負人爭怪得祖師來也太惺惺電光影裏親薦得薦得分明也隔津雪峰因三聖問透網金鱗以何為食峰云待汝出網來即向汝道聖云一千五百人善知識話頭也不識峰云老僧住持事繁禹門三汲起風雷戴角金鱗被網圍驀地翻身騰碧漢遭他點額下漁磯乾峰上堂云舉一不得舉二放過一著落在第二雲門出衆云昨日有人從天台來卻往徑山去峰云典座來日不得普請便下座舉一分明落二頭天台人往徑山遊赤鬚胡遇赤鬚赤腦後長釘暗裏抽雲門因僧問不起一念還有過也無門云須彌山火裏生火裏死慎終幾箇能如始擔箇須彌繞大千虛空撞落當門齒雲門云聞聲悟道見色明心遂舉起手云觀世音菩薩將錢買糊餅放下手云元來祗是饅頭聞聲悟道見色明心靈雲見桃華香嚴擊竹林髑髏識盡喜無立胡餅饅頭金博金雲門因僧問如何是一代時教門云對一說對一說口銜鐵帶角披毛無間歇嘉州大象喫一鞭陝府鐵牛痛不徹別別跛龜踏破蒼龍穴雲門每顧見僧即云鑑僧欲酬之則云咦頭上沒蹤跡腳下絶消息擬議待如何遭他顧鑑咦韶陽老起復倒拄杖拏雲穿碧漢大蟲戴角入荒草瑞巖每自喚主人公復應諾乃云惺惺著他後莫受人瞞慣弄精魂是禍胎不知誤卻幾人來無端平地開深阱多少風流被活埋智門因僧問蓮華未出水時如何門云蓮華出水後如何門云荷葉出水何如未出時蓮華荷葉兩依依靈根不在鳥啼處馬踐殘紅滿路飛首山因僧問如何是佛山云新婦騎驢阿家牽親切為君急處提回頭何得尚遲疑承當直下無餘事常憶當初滿腳泥七賢女遊尸陀林因緣大而無外細而無內以此索帝釋鏟地應難會妙用甚天然靈機真拔萃雖拔萃國有憲章三千條罪吾道一以貫之日紅月白東出西沒行無義路坐斷語默板齒生毛高山停舶祗者一貫兩箇五百摩竭掩室瞿曇無故夜拋磚拶著能令心膽酸骨董價高因有自髑髏乾盡待何年木人寒向火邊立石女昏來鏡裏眠坐斷兩頭君可驗中間一點見還偏毗邪杜口腳頭一路難回互脫卻皮膚體自堅東甕飲乾西甕酒張公醉倒李公軒驢蹄不似馬蹄曲牛角還同兔角尖不二門中消息子括囊早已落言詮德山托鉢無牙獅子謾調兒返躑嚬呻盡力施末後句少狐疑會得游行更讓誰萬古長空風月在三年從說是歸期東坡居士問琴操西湖境因緣滿園春色畫眉喧啼破浮雲宇宙寬金勒馬嘶芳草地玉樓人醉杏華天雲門因僧問如何是端坐念實相門云河裏失錢河裏漉河裏失錢河裏漉重陽遍地開金菊桑田變海古今然萬里江山一點墨藥山夜參不點