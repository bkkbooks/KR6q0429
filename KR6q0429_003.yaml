云願聞其要穴遂上堂舉世尊拈青蓮華目顧視大衆迦葉正與麼時且道說箇甚麼若道不說而說又是埋沒先聖且道說箇甚麼師乃拂袖而退穴擲下拄杖歸方丈侍僧請益云念法華為甚不袛對和尚穴云念法華會也次日與真園頭同上問訊穴問云作麼生是世尊不說說真云鵓鳩樹上啼穴云汝作許多癡福作麼何不體究言句又問師師云動容揚古路不墮悄然機穴謂真云何不看念法華下語師自茲印可後開法首山寶樹森森鬱茂林鵓鳩不解劫前春懸巖古路摩尼聚動用無如妙法音第十世汾陽昭禪師到首山山升座師出問百丈捲席意旨如何山云龍袖拂開全體現師云師意如何山云象王行處絶狐蹤師於言下大悟遂提坐具顧大衆云萬古碧潭空界月再三撈摝始應知禮拜歸衆有僧問云見何道理便爾自肯師云正是我放身命處輕輕拂動海門州驀拶黃河水倒流萬古碧潭誰辨的一輪穿破水中秋第十一世石霜圓禪師參汾陽經二年未許入室每見必罵一夕訴云自至法席不蒙指示念歲月飄忽己事未明有失出家之利語未卒汾叱云是惡知識敢裨販我怒舉杖逐之師擬伸救汾掩其口師乃大悟云是知臨濟道出常情歲月飄零入眼空怒拈白棒活如龍分明指點無生路道出常情一派通第十二世楊岐會禪師參慈明一日明上堂師出問幽鳥語喃喃辭雲入亂峰時如何明云我行荒草裏汝又入深村師云官不容針更借一問明便喝師云好喝明又喝師亦喝明連喝兩喝師禮拜明云此事是箇人方能擔荷師拂袖便行幽鳥辭雲立話端老胡門徑潑天寬自非西河金獅子難免遭他一問瞞第十三世白雲端禪師參楊岐岐問受業為誰師云茶陵郁和尚岐云聞伊過橋遭攧有省作偈甚奇能記否師頌云我有明珠一顆久被塵勞關鎖今朝塵淨光生照破山河萬朵岐笑而趍起師愕然通夕不寐黎明咨決適歲暮岐云汝昨日見打驅儺者麼云見岐云汝一籌不及渠師復駭問岐云渠愛人笑汝怕人笑師大悟一笑臨風顯大機暗藏春色幾人知驀然打破精靈窟萬紫千紅總是伊第十四世五祖演禪師親浮山遠遠令參白雲舉僧問南泉摩尼珠話請問雲叱之師領悟獻投機偈云山前一片間田地叉手叮嚀問祖翁幾度賣來還自買為憐松竹引清風雲印可云栗棘蓬禪屬子矣令掌磨未幾雲語師云有數禪客從廬山來皆有悟入處教伊說亦說得舉因緣問伊亦明得教伊下語亦下得秪是未在師疑自計云既悟了說亦說得明亦明得如何卻未在參究纍日忽省悟從前寶惜一時放下遂走見雲雲為手舞足蹈師後云吾因茲得出一身白汗便明得下載清風一片閒田古到今野花春草不能侵奈何特地栽松竹後代兒孫費討尋第十五世圓悟勤禪師為五祖侍者一日部使詣祖問道祖云提刑少時曾讀小艷詩否有兩句頗相近頻呼小玉元無事秪要檀郎認得聲提刑應喏喏師侍次問云提刑會否祖云他秪認得聲師云秪要檀郎認得聲既認得聲為甚卻不是祖云如何是祖師西來意庭前柏樹子聻師忽有省遽出見雞飛上欄杆鼓翅而鳴復自謂云此豈不是聲遂入室通所得呈偈云金鴨香銷錦繡幃笙歌叢裏醉扶歸少年一段風流事秪許佳人獨自知托情比戲離華鋒獨著旃檀寶樹風轉向庭前春色裏錦雞啼破太虛空第十六世虎丘隆禪師謁圓悟悟問見見之時見非是見見猶離見見不能及遂舉拳云還見麼師云見悟云頭上安頭師於言下脫然契證悟叱云見箇甚麼道理師云竹密不妨流水過悟深肯之奴郎別後始承家睡虎巖前露爪牙誰識漢朝基業固劉章酒令至今誇第十七世應菴華禪師初依圓悟痛與提策悟令見虎丘隆居半載通徹大法頓明圓悟為人處後開堂法嗣虎丘有僧傳師垂示語大慧見之極口稱歎有偈寄云坐斷金輪第一峰千妖百怪盡潛蹤年來又得真消息報道楊岐正脈通赤手摟空虎穴來幔天鐵網向潮開知音遙隔蓬萊島相報琅琅語似雷第十八世密菴傑禪師謁應菴菴問如何是正法眼師云破沙盆菴頷之時把綸竿釣素心煙波歷盡遇知音扁舟歸去霜天曉紅日青峰萬戶春第十九世破菴先禪師參密菴菴住靈隱師分座有道者請益云胡猻子捉不住願垂開示師云用捉他作麼如風吹水自然成紋時無準在旁有省湛水波紋沒覆藏普天匝地露堂堂男兒具有超方眼覿體相看八面剛第二十世無準範禪師初謁一老宿問坐禪之法宿云禪是何物坐底是誰師體究一日如廁有省次參育王佛照照問何處人師云劍州人照云帶得劍來麼師隨聲便喝照笑云這烏頭子也亂做後至靈隱時破菴為第一座同遊石筍菴有道者請益胡猻子話師在旁當下脫然踏碎煙痕入亂峰閉門深自寫從容一聲何處猿啼月萬壑千溪曉夢中第二十一世雪巖欽禪師參天目禮令看臨濟三頓痛棒話一日上蒲團忽有省後在無準會中每遇入室舉主人公便可打𨁝跳舉衲僧巴鼻佛祖爪牙更無下口處經十年偶佛殿前行抬眸見一株古柏觸著向來所得境界和底一時揚下方始見徑山老人立地處帶月披霜四海遊十年鶴夢不知秋一株古柏金風戰揚下清光露兩眸第二十二世高峰妙禪師謁雪巖才問訊插香被一頓痛棒打出後一入門便問誰與你拖這死尸來聲未絶便打出一日睹五祖演真贊云百年三萬六千朝返覆元來是這漢有省後侍巖巖詰云日間浩浩地作得主麼師云作得主又問睡夢中作得主麼師云作得主又問正睡著時無夢無想無見無聞主在甚麼處師無對後因同宿道友推枕子墮地作聲大悟云元來只是舊時人不改舊時行履處驀然踏破水晶宮金色銀光處處同直向孤峰頂上宿春雷震徹主人公第二十三世中峰本禪師因觀流有省詣高峰求證被峰打趁出既而民間訛傳官選童男女師因問云忽有人來問和尚討童男女時如何峰云我但度竹篦子與他師言下洞然徹法底源無端求麝染膻腥踏破乾坤別問津索得童男都撇卻竹篦三尺證無生第二十四世千巖長禪師見中峰初參狗子無佛性話因聞鵲聲有省具陳悟因峰斥之師憤然歸夜半忽鼠翻貓器墮地恍然開悟往質峰峰問云趙州何故云無師云鼠食貓飯峰云未在師云飯器破矣峰云破後如何師云築碎方甓峰乃微笑囑云善自護持時節若至其理自彰幽鳥喃喃報好音鼠翻貓器最為親直教枯木寒巖上一點回光萬象春第二十五世萬峰蔚禪師慕千巖道風往謁初入室巖問將甚麼與老僧相見師豎拳云這裏與和尚相見巖又問死了燒了向何處安身立命師云漚生漚滅水還在風息波平月映潭巖云莫要請益受戒麼師即掩耳而出明日普請斫松師拈圓石作獻珠狀云請和尚酬價巖云不直半文錢師云瞎巖云你也瞎我也瞎師云瞎瞎嶽路迢迢一色新晴空萬里淨煙塵箭鋒相柱難回避撲落嬋娟徹夜明第二十六世寶藏持禪師參萬峰峰付偈云大愚肋下痛還拳三要三玄絶正偏臨濟窟中獅子子燈燈續焰古今傳山色湖光不費猜三玄要付棟梁材金毛窟裏金獅子一吼從教萬象回第二十七世東明旵禪師親寶藏持一日藏問云心不是佛智不是道汝云何會師向前問訊叉手而立藏呵云汝在此許多時還作這箇見解師乃憤然至第二日驀然徹法底源乃呈偈云一拳打破太虛空百億須彌不露蹤借問箇中誰是主扶桑湧出一輪紅雲龍風虎印寰中叉手猶然隔萬重百億須彌都扭碎海門迸出一輪紅第二十八世海舟慈禪師嗣東明失機緣語録歷盡閻浮道路賒誰知滄海是生涯東明一滴曹溪水運出慈舟濟劫沙第二十九世寶峰瑄禪師居金陵高峰寺天奇參師問甚麼處來云北京師云只在北京別有去處云隨方瀟灑師云曾到四川否云曾到師云四川境界與此間境界何如云江山雖異風月一般師豎拳云還有這箇麼云無師云因甚卻無云非我境界師云如何是你境界云諸佛不能識誰敢強安名師云汝豈不是著空云終不向鬼窟裏作活計師云西天九十六種外道你是第一奇拂袖便出問著蠶叢事轉賒錦江春色古來誇何如此地風光好二水中分白露沙第三十世天奇瑞禪師因病中看大慧瘩背因緣有省自此有問便行棒喝偶聞山鹿叫喚會得日用之中無不是語後同祖月看應菴語録證悟忽一日行途中不覺身心廓落從前所悟所證一場懡㦬自懊云將謂有多少奇特後到金陵見寶峰峰為印可說偈云濟山棒喝如輕觸殺活從教手眼親聖解凡情俱坐斷曇華猶放一枝新腳跟踏遍水雲畸萬戶千門一月輝更向寶峰春色裏曇華香處顯全機第三十一世無聞聰禪師參天奇奇問在世忘世時如何師云了物非物奇云在念忘念時如何師云於心無心奇云心物俱忘時如何師云華山高突太行峨華山高突太行峨此箇難忘事轉多者裏不堪言句會一輪秋月映江波第三十二世笑巖寶禪師參無聞問云十聖三賢已全聖智如何道不明斯旨聞厲聲云十聖三賢爾已知如何是斯旨速道師下語不契一日提籃水邊洗菜忽一莖菜葉墮水逐水圜轉捉不著師忽有省喜躍攜籃歸入見聞聞問是甚麼師云一籃菜聞云何不別道一句師云請和尚別問來後再參與聞圍爐次聞乃問人人有箇本來父母子之父母今在何處師云一火焚之聞云恁麼則子無父母耶師云有則有佛眼覷不見聞云子還見麼師云某亦不見聞云為甚麼不見師云若見則非真父母呈偈云本來真父母歷劫不曾離起坐承他力寒溫亦共知相逢不相見相見不相識為問今何在分明呈似師聞云只此一偈堪紹吾宗遂印可一莖漂出順溪流八臂修羅無計留歸去堂前親舉似高提籃子足機籌第三十三世幻有傳禪師因聞燈華爆有省便遊方參笑巖求證巖云汝把從前所悟底得力工夫一一說來我為汝印證師具實語中間驀躍出隻履云向這裏道取一句看遂把師話一時打斷師通夕不寐明晨立簷下巖出方丈見之乃喚師師回顧巖翹一足作修羅障日月勢師自茲脫然修羅日月掌中擎照破燈花劫外春休問華山誰劈破摸稜金掌萬年新第三十四世天童悟禪師因閲壇經發心參究一日負薪過山彎見堆柴有省遂棄妻孥從幻有傳和尚脫白執爨負舂身任衆務久不憚勞後納僧服矢明此事偶城歸過銅棺山頂豁然大悟覺情與無情煥然等現覓纖毫過患了不可得時傳和尚入燕都師往省覲傳見便問老僧離你三載還有新會處也無師云有傳云何不呈似老僧師云一人有慶萬民樂業傳云你又作麼生師云某甲特特來省覲和尚傳云念汝遠來放汝三十棒師珍重出後因南還復歸省傳問你到諸方曾見甚麼人師以腳打地以手拍膝傳云你許多時一點氣息也無師云和尚疑則別參傳乃撾鼓集衆付師衣拂以為可倚以支臨濟徹底掀翻世路窠千艱萬纍自摩娑自從踏破銅棺頂躍出圓明照劫波第三十五世龍池微禪師嘉禾張氏子性淳朴幼負出塵志十九入興善寺剃染知有生死大事日夕不去心每遇耆碩即求開導有授以禪關策進師捧之如獲至寶因見趙州無字話懷疑數年不倦偶讀楞嚴經至諸可還者自然非汝不汝還者非汝而誰有省入雲門參湛然禪師問無夢無想主人公話不契心思迷悶一日禪師上堂云且道一切放下阿那箇是你主人公豎起拂子云舉頭天外看誰是箇般人師聞如在黑暗中跳出復念古人十死九生幾番徹悟方得大休大歇我何人敢爾罷參耶即上金粟參密雲和尚茶次密問者位師僧那裏師便喝密云老僧過在甚麼處師云再犯不容密云犯後如何師擬答密即打云該是我打你師直得通身汗下伎倆都盡不能加答因入城聞人家打小廁云看你藏在那裏去師不覺通身踴躍占偈云沒處藏沒處藏全身獨露在街坊堪笑華亭擺渡漢葛藤打得太郎當遂入山亦不言所得久之密上堂有僧問佛法大意密云近前來僧近前密云老僧從來不眼花師於言下頓釋從前寶惜親見佛祖及一切衆生立地處自此師資低昂當機不讓後密住天童師復入山司侍寮密一日問熏風自南來殿閣生微涼你作麼生會師云嚴霜初降徹骨皆寒密云天地縣隔師拂袖出呈偈云熏風自南來殿閣生微涼遍體寒毛豎將身納被藏鼻息鼾鼾一覺醒從來越國是南方密頷之因辭出山密即付以衣拂師後開發吳之荊溪龍池山有語録十卷行世金鎖重重啓固關六宮齊奏凱歌還禹門坐斷三千頃平地波騰萬仞山
