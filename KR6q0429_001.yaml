body:
  text: 侍者超祥記録住姑蘇慧燈禪院於順治甲午歲二月十六日進院山門不得其門而入縱有瓊樓玉殿卻被一莖草盍卻苟得其門而入便能於一莖草上現出瓊樓玉殿山僧到此為諸人八字打開去也拽杖便入佛殿挺若須彌淨若蓮重重相好露金仙知音不在頻頻舉一段光明徹大千展具便拜方丈據此室行此令橫按莫邪勦除凡聖縱使佛祖到來也須乞命卓拄杖便起當日衆檀護恭請上堂拈疏云文光射斗展演佛祖靈機法幟揮空開豁人天正眼符到令行不煩宣舉升座祝聖畢次拈香云此一瓣香當陽拈出爇向爐中供養現住禹門堂上本師萬如大和尚用酬法乳之恩上首白椎云法筵龍象衆當觀第一義師云親自禹門駕鐵舟姑蘇城外放金鉤半竿穿破平江月四海獰龍一釣收還有負命金鱗麼出衆相見問選佛場開心空及第人人鼻孔撩天個個腳跟著地選佛場開即不問鼻孔撩天事若何師云穿卻了也進云腳跟著地又作麼生師云撞破玉樓鐘進云水歸大海波濤靜雲到蒼梧氣象間師云敕點飛龍馬跛鱉出頭來問震法雷鳴法鼓請和尚現大人相而為説法師云你還見麼如何是無人相師云柳色黃金嫩如何是無我相師云梨華白雪香如何是無衆生相師云玉樓藏翡翠如何是無壽者相師云金殿鎖鴛鴦問昔年給孤布金請佛説法今日衆檀創院請師登座未審是同是別師云多少人分疏不下進云即今衆檀那與給孤長者還有優劣也無師云優則俱優劣則俱劣進云已創慧燈成古剎祖印拈來付與誰師云普天匝地僧托開兩手云學人大開方便門去也師云腳跟下好與三十棒問鋼刀斬斷霹靂雄關時如何師云逡巡有分進云六臂三頭擎日月卻承渠力耀乾坤師云汝喫棒未得在進云清淨萬緣無罣礙虛空突出一蓬頭師云眼華作麼僧喝師云亂叫喚進云四衆殷勤同瞻仰一炷清香滿石樓師云不易念得來乃云打殺南山虎驚飛北海龍破砂盆斬新扶起吹毛劍特地拈來若是英靈漢子不消一拶直下承當活卓卓地不受羅籠全彰妙用脫體無依到者裏直饒澄潭月影靜夜鐘聲隨扣擊以無虧觸波瀾而不散好與三十棒祗如山僧恁麼批判且道明甚麼邊事還有人分析得出麼不見道劈開華嶽連天秀放出黃河六月冰卓拄杖一下上首白椎云諦觀法王法法王法如是下座浴佛日檀護陳方山請上堂曾聞石女産麒麟添得嬰孩氣象新金鎖玉關渾不住萬機頭上鼓煙塵當時盡道難相委今日方知不是心大衆且道不是那箇心卓拄杖云不得雲門施好手幾乎錯認定盤星下座師誕辰請上堂妙性圓明絶覆藏普天匝地露堂堂人人盡有金剛眼指出庭前桂蕊香衆中有具金剛眼者請出相見問仙苑瑤觴春滿宴禪關紫氣瑞盈眸慧燈永永法王座雨露天邊沐好秋正與麼時未審和尚如何施設師云風行草偃進云自從認得曹溪路了知生死不相干師云也須照顧腳跟乃云但能頓歇馳求便領現前受用磨礱三尺劍待斬不平人縱橫在我殺活繇誰智照無私纖塵不立到者裏不妨虎口裏橫身一任驅耕奪食流聲名於萬世傳祖道於千秋立時俗之標格作法門之榜樣其或未然祗知事逐眼前過不覺老從頭上來元旦上堂新年佛法起雷鳴闢草開荒萬物新不透禹門三汲浪乾坤何處定煙塵拈拄杖云聊把扁舟清夜笛和煙吹出洞庭春下座觀音誕上堂問觀音大士未降母胎向甚麼處安身師卓拄杖一下進云已入母胎為甚卻藏頭露尾師云莫謗他好進云已出母胎作麼生施設師便打問一輪紅日現萬里絶纖塵時如何師云那裏學得者虛頭來僧繞身一匝師云腳跟下不穩在進云踏著稱錘硬似鐵師云秪恐不是玉僧便喝師云再喝喝看僧展兩手師云果然弄虛頭乃云觀音菩薩未出母胎以楊柳枝穿卻大地衆生鼻孔將甘露水普潤遍界靈苗已出母胎口吞日月眼盍乾坤諸人還委悉也無驀拈拄杖卓一下云遮藏不得人人見萬紫千紅總是春下座王舜符居士請上堂問大鵬一舉九萬里穿雲鷂子與天齊鳳凰不是凡間鳥為瑞為祥正此時為瑞為祥即不問壽量彌天事若何師云月朗千峰秀風高萬壑鳴進云恁麼則雲中不睹雙雕落箭過新羅十萬程師云不妨迥出一頭地問和尚壽誕即不問未出母胎時在甚麼處安身立命師云高著眼始得問大洋海底起紅塵須彌山頂浪滔天師云那裏見得僧擬議師云三十棒且待別時乃云故國清貧已有年白頭知命順生緣眉毛仍在眼睛上鼻孔撩天不著穿昨夜山門騎露柱東西南北走不住不知何事太忙生盡被秋光牽引去惟有青青柏與松萬年千載色如是下座慈雲禪人請上堂問弘開法席大闡宗風四衆雲臻高升猊座如何是父母未生前一句師云八十翁翁輥繡毬進云碧桃已結千年外師云靈苗秀發別生芽進云恁麼則玉樹華開萬古春師云好箇消息居士問師五十以前事若何師卓拄杖云者箇是拄杖子進云五十以後又如何師復卓拄杖云者箇不喚作拄杖子進云正當今日華雨滿筵香雲盈座未審還有為人處也無師云分身兩處看乃云乾坤盡是黃金國無限平人不肯休休擬議莫凝眸雲自高飛水自流要知一句難藏處黃鶴樓前鸚鵡洲下座上堂生緣衡嶽幾經秋坐斷孤峰天外遊一句了然超百億飢餐渴飲更何求且道見個甚麼道理得恁麼自在鉢盂口向天大蟲原是虎上堂問覿面金鎚即不問南山疊翠是如何師云石虎叫時山谷響鐵牛吼處木人驚進云恁麼則龍得水時添意氣虎逢山勢長威獰師云賴遇闍黎證明問慧燈爍破千峰頂何處須彌作壽山師云孤迥迥峭巍巍乃云三藏靈文百千妙義盡底掀翻祗在諸人眉端上放光耀古騰今輝天鑑地此事且置祗如預布津梁一句作麼生道覺樹華開萬古春上堂問慧日高懸千山並秀滿目英賢誰是作者師云獨你是鈍漢進云師子窟中無異獸師云汝試𨁝跳看問大悲千手眼那個是正眼師云千聖覷不到進云通身全現摩尼寶遍界輝騰遍界香師云又恁麼去也乃云無尾大蟲難傍近近前便也傷人命除非自解據虎頭自然頭正尾亦正黑漆鉢盂添箇柄復舉陸亙大夫問南泉和尚曰學人瓶中養一鵝鵝漸大出不得如今不得毀瓶不得損鵝和尚作麼生出得泉喚大夫陸應諾泉云出也陸從此開悟師云陸大夫弄巧成拙若不是南泉未免瓶破鵝飛自傷己命且道喚出後如何萬里鵬翔遠千年鶴共飛下座師至太倉佛成道日衆檀請上堂問昔日總持云如慶喜見阿閦佛一見更不再見且道與世尊睹明星悟道還有優劣也無師云龍眠自有衝天志進云當陽一句無私語放出千年露地牛師云逢人切莫錯舉問祖祖相傳即不問燈燈續焰事如何師云金翅鳥王當宇宙箇中誰是出頭人進云踏斷曹溪空劫外乾坤何處不稱尊師云你還未夢見在僧喝師便打乃云正覺山前明星現瑞輝騰今古積慶菴中衆目全彰爍破乾坤明明不覆藏歷歷無遮護抹去野狐涎潑開凡聖路虎穴魔宮隨心瀟灑須彌大海任我翻騰如龍得水似虎踞山佛祖到來管教他無容身之地且道釋迦老子還有出頭分也無卓拄杖云枯木堂前休錯過白雲堆裏好商量朔風連日通消息獨讓寒梅遍界香下座師至盛澤圓明寺衆請上堂一點圓明萬古奇來登寶座顯全機風流徹底難教露未許通方作者知卓拄杖云還有作家戰將麼請出相見張休石問四衆咸臨人天普集圓明葛藤即不問如何是意到句不到師云未到烏江畔知君不肯休如何是句到意不到師云若無舉鼎拔山力千里烏騅不易騎如何是意句俱到師打云正好喫棒如何是意句俱不到師云揚起眉毛須薦取三千里外有知音進云祖翁一片間田地不是飽餐人不知師云好收原本契書著張權始問如何是奪人不奪境師云一自當年折鳳凰至今魚雁兩茫茫如何是奪境不奪人師云雖然未得黃金印及第還他折桂郎如何是人境兩俱奪師云夜半曉星歸宿夢瀟湘夜雨斷愁腸如何是人境俱不奪師云摘詩漫寫圓明寺高挂雲帆繞像張乃云禹門堂上傳得鉢囊圓明寺裏高提鈯斧頭頭玉振金聲處處龍飛鳳舞輥甚雪峰毬打甚禾山鼓葛藤千七俱拈卻明明一句超今古到者裏劈開潭底月流出少林髓大衆還見少林髓麼卓拄杖云倒卓橫拈無別路迅雷奔電絶淆訛下座師至嘉興如如菴胡奉溪居士薦子請上堂卓拄杖云當陽拈出活如龍探海拔山振祖風千衆臨筵齊努目一靈超出杳無蹤大衆既是超出因甚又説杳無蹤還有通方作者麼出衆緇素看問桂魄香飄秋林葉落未審亡靈即今在甚麼處師云四海浪平龍睡穩九天雲淨鶴飛高僧喝師便打問如何是奪人不奪境師云中庭地白樹棲鴉如何是奪境不奪人師云冷露無聲濕桂華如何是人境俱不奪師云今夜月明人盡望如何是人境俱奪師云不知秋思落誰家進云胡居士今日請和尚升座薦亡還許亡靈聽法也無師良久僧喝師打云正要汝疑著乃擊拄杖云擊開枯木聽龍吟迸出髑髏雙眼睛行至鳥道玄關處大家緇素要分明乾坤宇宙眼中豎鐵壁銀山眉上橫薦得亡靈真面目萬里秋江一月澄到者裏極億劫之數量竭萬世之樞機出生死愛河脫輪回苦海且道亡靈畢竟往生何處舉拄杖云覿面相承知落處亡靈端坐寶蓮臺復舉南雍軍提刑趙伯肆居士寓綿江瑞峰院聞母訃音作種種功德復請禪師建靈光道場一夕夢寐中見母告曰汝平生事君忠事親孝我死後汝作佛事吾並不知惟靈光法事吾得領受今已得超生佛界特來報汝汝宜益尊三寶不可怠慢言訖冉冉而去伯肆驚覺歎異是年又集僧結制朝夕參請植此善因存亡獲福然畢竟超脫一句作麼生道渠無生死可相求寶月澄輝萬古秋漢地楚天收不得南湖依舊水東流下座師至國福禪林請上堂馮居士出衆一喝師便打進云牛頭未見四祖時如何師云萬里青天一展眉見後如何師云碧潭秋月映珊瑚見與未見時如何師云疑殺汝士又喝師云亂喝作麼乃云臥雲深處不朝天剖一微塵出大千師子吼斷黃金索象王耕破劫初田當機會得真消息火內重開五葉蓮咦要與秋風戰一場等間直入空王殿且道空王殿作麼生入顧左右云誰家灶裏無煙焰衆檀請就國福院開爐升座爐韝鉗錘匝地開鐵壁銀山打作堆大冶精金從此鍊脫皮換骨絶疑猜忽然絶後再蘇醒萬象森羅笑滿腮卓拄杖云且道笑箇甚麼者回識得娘生面照乘何須更戀胎祗如臨濟道有一無位真人在汝諸人面門出入未證據者看看驀召大衆云如何是無位真人衆回首師云歸堂去下座高夫人設齋請上堂長連床上急思量日月如梭似箭忙一氣不來渾似夢髑髏何處問西方可憐山色身形大誰識溪聲舌相長鵲噪鴉鳴談妙法山門佛殿放豪光機先薦得三遭棒臨濟宗風滿大唐休擬議絶商量分明覿體要承當老姥一鉢和籮飯到口方知滋味長解冬退院上堂問解開布袋結放出獨角牛請師拈出一角牛師打云高著眼進云秦不收兮漢不管鼻孔撩天不著穿師云信汝一半進云吽吽師云大好不著穿乃云慧刀截斷輪回路智劍揮開生死門耳見眼聞誰舉覺逆來順往總承恩大衆解制後還知山僧去向麼卓拄杖云扁舟一葉過吳門腳跟曾不動埃塵拋綸擲釣非吾事舞棹呈橈我不能轉柁觸翻千尺雪放篙撑破五湖冰從教纜挂枯椿上恣與虛空打葛藤驀以拄杖作圓相云除此現成公案外別無一法繼傳燈下座住昭陽普度菴脫塵上人同李夫人洎衆優婆夷等請上堂拈香祝聖畢次拈云此一瓣香爇向爐中端伸供養現住荊溪龍池堂上本師萬如大和尚用酬法乳之恩斂衣就座上首白椎云法筵龍象衆當觀第一義師云亙古稀奇事不窮斬新高唱禹門宗衡山機用同拈出一滴曹溪萬派通衆中還有唱和得者麼不妨出衆相見問慧劍劈開天地暗一輪明月皎虛空當陽法戰親臨敶猊座高升是若何師云杲日當天進云未升座已前又作麼生師云疏風遍野進云學人禮拜去也師云許你伶俐問南嶽開華禹門結果未審和尚唱誰家曲師云一月映萬川進云恁麼則湖水連天碧薰風匝地香師云那裏得者消息來尼一喝師便打問高升寶座牙爪全張獅子窟中狐蹤淨掃未審承誰恩力師正身而坐進云龍得水時增意氣虎逢山勢長威獰師云不勞讚歎問不是心不是佛不是物是箇甚麼師卓拄杖一下進云恁麼則七尺烏藤行活計一條白棒展全機師云如何是你底活計進云祗有天在上更無山與齊師云放汝三十棒乃豎拂子召大衆云會麼會則干戈永息天下太平不會徒向山僧口裏討鹽討醋山僧昔年在南嶽刀耕火種時收得些榾柮今來普度菴中與汝等當陽拈過非圖續焰連煙且要大家知有遂舉七賢女遊尸陀林一女云尸在者裏人向甚麼處去一女云作麼作麼諸女一時契悟且道現前大衆與七賢女相去多少若向者裏逴得便行不勞向外馳求自然得大受用其或未然擊拂子云神威顯出騰蛟鳳電眼揮來錯過他上首白椎云諦觀法王法法王法如是下座上堂昨日晴兮今日雨不知何處明心旨舉拂子云即此用離此用別無消息與君共三春芳草碧連天應看龍吟霧起虎嘯風動雖然到者裏還有與山僧相見者麼問昔日圓悟禪師會下一夜悟十七八箇人今日和尚者裏悟得幾箇師云祗你漆桶不快進云獅子吼時芳草緑象王回顧落華紅師云賴汝記得僧無語師便打乃云覷透毗盧頂門踏破當人草鞋遊遍三千大千世界方好發出千鈞之弩射透無邊香水海一切衆生悉皆成佛且道成佛後又作麼生一把柳絲收不得和煙搭上玉闌干下座端午上堂圓明不動當處全彰妙體無私迥然獨露大道祗在目前要且目前難睹了無所住無所從來捲舒莫測收放自在直饒當下會得已涉言詮更若遲疑何曾瞥地直須透向上頂𩕳據當陽捷徑始得仗蒲劍斬千邪搖艾旗扣百福大衆作麼生是向上頂𩕳當陽捷徑左右顧視云看取自家鼻孔休沾雌黃氣息卓拄杖下座上堂欲知佛性義當觀時節因緣山僧昔住祝融峰頂提柄鈯斧未免灰頭土面今日杭州市上斬新拈出又復拖泥帶水大衆且道灰頭土面是拖泥帶水是驀拈拄杖卓一下云萬古碧潭空界月再三撈摝始應知下座觀音成道日上堂問龍池一滴起根源南嶽家聲震大千師子座前重獻瑞圓通一句請師宣師云穿過髑髏也不知進云如何是圓通體師云慈雲香散千峰雨如何是圓通用師云寶鐸聲傳萬里風進云恁麼則有意氣時添意氣不風流處也風流師云如何是汝風流處僧便喝師云好喝僧禮拜師便打乃云觀世音菩薩向山僧拄杖頭上來也大衆還見麼説盡無生般若談遍圓通妙義大衆還聞麼若也共見共聞則鐘鳴鼓響總皆入理之門柏短松長盡是真如境界大丈夫兒向者裏捏碎虛空騎聲盍色孤峰頂上橫眠卻在十字街頭垂手十字街頭垂手原在孤峰頂上橫眠隨方應現觸處圓通雖然且圓通一句畢竟作麼生道卓拄杖云天共白雲曉水和明月流下座沈夫人誕日請上堂冥通三界洞徹十虛函盍乾坤包羅萬象道有則纖塵不立道無則遍周沙界擬心湊泊白雲萬里著意馳求風塵匝地若也回光知落處一輪明月正當天復舉吳山師子端禪師因尼來參端以紅粉塗面尼輒驚悟師云大道從來本現成何分女相與男形忙忙業識無時住滾滾塵緣不暫停富貴功名風裏燭金銀田土日中冰須明覿體無生忍雲在青天水在瓶驀召大衆云祝延一句又作麼生委悉擊拂子云芙蓉露滴筵鋪錦丹桂香飄地布金下座請上堂返照回光達本源玄機直透劫初前千尋海底搖金錫萬仞峰頭駕鐵船木馬嘶時風匝地泥牛吼處浪滔天箇中識得無生句此土他方應有緣驀召大衆云昔日玄期高公祖欽命監督楚籓七年愛養士民惠政滂流建生祠於南嶽即今碑文現載遺像儼然山僧偶寓禾城敬承伊孫念祖居士請升座薦公不免舉則先祖因緣貴圖以楔出楔山僧先祖幻臣劉公曾作蘇郡刺史詢訪知識參箇無位真人話有省年九十歲一日忽云高工部進衙時吾示寂矣壬辰冬月公聞鋭聲便坐脫大衆且道先祖劉公與玄期高公還有同別也無若道是同天地懸隔若道是別去來靡問於此若明許伊具一隻眼於此不明亦許伊具一隻眼明與不明且置祗今高氏先靈與劉公託生何處喝一喝云一人越聖明心地九代先宗樂性天者顆寶珠何處是南湖湘水月娟娟下座師至當湖善護菴一音禪師同衆檀護請上堂當湖善護別人間八面玲瓏著眼看凡鳥等間難泊近玉簫品出舞祥鸞還有出自丹穴者麼試出來鼓翅看問敲石燒丹一老顛等間拾得火中蓮特祈和尚通消息要使人人達本源師云三十棒寄打汝師進云同道方知師云胡人飲乳反怪良醫問古德不出方丈如何莊上喫油餈師云多少人摸索不著進云侍者方出門忽見莊主又作麼生師云好箇消息進云水晶簾動微風起滿架薔薇一院香師云有甚麼交涉問興化打維那意旨如何師云瞎卻人眼睛進云次日罰饡飯出堂又作麼生師云前箭猶輕後箭深士禮拜師云逢人切莫錯舉乃云秋露垂秋風吹秋雲冉冉秋草離離月落寒潭靜山空木葉飛吾無隱乎爾通方作者知大衆還知麼若也知得推倒報本塔椎碎弄珠樓一任橫行海內獨步大千其或未然眨上眉毛劍去久矣卓拄杖下座善護禪院一公院主同諸護法紳襟請就院開爐上堂問罏鞴已就四衆雲臻和尚作麼生煆煉師打云一棒一條痕進云棒頭點出金剛眼大千沙界盡沾恩師云不勞讚歎問當湖震布今日乍開未審垂何方便師云放汝三十棒進云昔日世尊今朝和尚師云那裏見得進云天晴日出雨下地濕師云莫被他換卻眼睛問掀天揭地逞風流大道無分男女儔白璧定從山上採赤珠端向海中求今日和尚大冶洪開煆煉凡聖未審何人搬柴何人運炭師云無眼耳鼻舌身意者進云恁麼則打鼓弄琵琶相逢一會家祗如不受爐錘底來和尚作麼生下手師便打問新開爐鞴即不問舊日乾坤事若何師云風不來樹不動進云好鳥枝頭叫小春師云斷頭船子下楊州進云舊日乾坤應自在新開爐鞴事如何師打云也少者一錘不得進云龍袖拂開全體現象王行處絶狐蹤便歸衆師云雲綻不須藏九尾乃云爐鞴通紅瓶盤叉釧鎔為一金鉗錘妙密大小偏圓打成一片人人塵淨光生箇箇魂消膽落等間舒一指擉瞎達磨眼睛舉一步踏碎釋迦腦盍有時拈一莖草作丈六金身千聖躋攀無路有時將丈六金身作一莖草萬靈景仰無門我為法王於法自在大衆且道具甚麼神通得恁麼穩便驀拈拄杖卓一下云竿木隨身行宇宙逢場作戲自超群解制上堂問古人云東去西去直須向萬里無寸草處去祗如萬里無寸草還有為人處也無師云正好喫棒進云洎不問過師云親言出親口進云與麼則人人聳息師云立定腳跟好進云等間垂一釣驚動碧波鱗師云離鉤三寸道取一句來士彈指一下師云一釣便上問和尚今日上堂也是無風起浪某甲到此已是拖泥帶水出格一句請師道取師便打士翻斤斗而出師云弄精魂漢乃云全提正令入摩竭大地眉毛共撕結等間便度九十朝冰壺已泮春風發鐵壁銀山俱靠倒笑殺銅頭與鐵額波斯攪得海嶽渾金毛獅子走深澤神駒萬里謾追風眨得眼來天地隔以拂子打云一處最親千機莫測衆禪客瞥不瞥處處緑楊春正好自是不歸歸便得小參觀音成道日陳方三沈念溪為子姓起名請小參問觀音現瑞耀騰今古出格英靈全提正令未審是神通妙用法爾如然師云汝試卜度看乃云觀音妙智力能救世間苦等間運神通接引無窮極召大衆云還見麼頭頭普現華藏莊嚴處處全彰圓通境界若見得轉凡成聖轉苦為樂轉天為壽其或未然山僧不惜眉毛為汝頌出普陀山前獨露身炎蒸此日道初成百千諸佛同饒舌覿面相逢不費尋且道觀音菩薩即今説甚麼法卓拄杖云華含無量摩尼聚風動常宣妙法音中元請小參問慎終追遠即不問超升一句事如何師云微雨灑花千滴淚淡煙籠竹一堆愁乃云從門入者不是家珍自己胸中流出方始盍天盍地舉頭天外看誰是箇般人若果是其人管教一拶百雜碎掃蕩聖凡窠窟滅卻正法眼藏以地獄作天堂轉煩惱為智慧打破涅槃城踢翻解脫道橫行湖海獨步大方不是神通妙用亦非法爾如然驀拈拄杖卓一下云但能當下空諸有共轉如來正法輪除夕小參一年三百六十日看看忙到今宵畢不愁生死祗愁貧業障重重心上結幽途輪轉幾時休一味昏迷循舊轍勸君努力脫塵埃免使今生和本折凡聖等倫元不殊貴在當人直下瞥莫待無常殺鬼臨再出頭來甚時節中元小參踢破玄關透鐵圍懸崖撒手便知歸性天朗耀頭頭鑑心月圓明處處輝差別路中須踏過涅槃城裏已忘機箇中何處著生死説甚輪回是與非召大衆云徹上座恁麼告報設有旁不甘者出來道其如地獄未空何果然癡人面前不可説夢除夕小參參禪貴通正脈莫向外邊涉獵縱饒得些玄解也是眼中金屑説甚西來大意未免平地喫跌自己一箇鼻孔有氣教誰出泄觸處昭然獨露擬議早已隔絶善惡都莫思量脫體迥然超越靈機自覺無多功力不久不徹莫把自己家珍翻比外來瓦礫現成一段風光愚人妄自扭捏倒樹須要搜根少去尋枝摘葉得路便爾歸家要無別傳祕訣會則途中受用不會沉淪永劫驀以拄杖打圓相云若向者裏透過方得大休大歇大衆還有透得過者麼一年將盡夜萬里未歸客
