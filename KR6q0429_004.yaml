故隱草堂風月自婆娑其五夷則風高雁字斜滄洲幾度漢年華南湖羡有穿雲枻北海殊無貫月槎老去懶撾塗毒鼓秋來怕聽塞垣笳違時最恨岩前菊人未云歸先放花其六望衡何處隔清暉開眼寧知闔眼非遍地草蟲和露泣驚秋旅雁傍霞飛一天疏雨千山暗數壑閒雲萬慮微不是同條難作伴隨身竿木蹈寒歸其七斷腸秋草滿天涯飄渺孤雲何處家南國開殘秦地菊西風落盡漢宮花活埋幸有青山在老病頻添白髮賒湘嶺豈無龍虎穴成群何必混狐蝦其八天涯踏遍又寒侵若箇能同返舊林山盡水窮欣有策鳥啼花放了無心屠龍劍客狂中舞賦鵬書生醉裏吟堪笑閒忙俱少實乾坤何地覓知音其九落木蕭蕭動客塵侵藤二鼠不饒人貪他蜜味將心魅贏得流離似我貧沉醉九醞常處夜循環六趣幾生身老僧雲散枮岩日幾度呼君早出倫其十瓢囊雲水問瞿曇吸盡滄溟學放憨堪羡紙衣溫似纊頻思棠梨美于柑瀾翻智度悲龍樹血染離騷賦楚南骨白千山候萬戶何如破衲擁蘿龕示子修高居士存心養性本非同見性明心義孰融所幸少年能有志直須慧劍截長空五車書外明三要一喝聲中證六通休得逢場尋傀儡到頭當認主人公壽普明寺明巖老師七十南華風景恣敖游海月山雲眼底酬兩岸蓼花乘醉壑一湖澄練滿煙樓好看星斗呈金果喝起虹霓駕玉洲昨夜廣寒宮未閉普明重掛一枝秋贈高念祖汝揆更生三居士爭羡門客駟馬車文章澤在看傳家學通百氏推才藪法識三乘見慧花福德夙生咸有自勳名他日並堪誇期君外護母忘卻現宰官身願不賒七言四句參禪偈六首話頭疑處須猛烈打破虛空要見血不向此回下毒手千生萬劫應難徹話頭疑處見空王疑到忘機露寂光自是面門常出現無形無影貌堂堂話頭疑處俗情除貴在承當無缺餘栗棘金圈吞吐盡堂堂獨露豈非渠話頭提起絶狐疑殺活縱橫顯大機手把金剛王寶劍魔來佛往一齊揮話頭疑處咬枯根咬斷枯根見不存滋味淡然須吐卻始知遍界獨稱尊話頭疑處透生死一透直入無彼此看破稱錘原是鐵塵塵剎剎絶終始念佛偈六首念佛須教審是誰分明覿體露全機但得淨念常相繼九品蓮邦處處歸念佛聲中須自薦回光看破娘生面等閒一句都忘卻心佛不離這一念念佛迢迢拽轉來五葉蓮華當處開枝枝葉葉俱剪盡心佛衆生一處理念佛一聲即到家何須特地起多嗟西方大道如弦直擬涉思惟路轉差念佛心中絶點塵莫將迷悟辨疏親自性彌陀渾不覺只是花前月下人心心念佛自純清珠山寶樹茂榮榮苦海愛河無住處于無住處見平生萬年松冰霜節與鐵心堅太古音傳風雨前但使深根植地老寧憂直幹不扶天過高橋普度尼菴借宿踏破蒼苔訪舊蹤新花嫩柳映溪容山光四顧寒煙暮挂錫何妨聽曉鐘秋日懷母斫額萱堂秋信來籬邊黃菊帶霜開為憐消息無人寄一日峰前望幾回題太白祠凜凜寒祠古木悲白衣猶記作詩時祠前亦有商山路不學商山歌紫芝偈示優婆夷自外道轉禪道者卻邪求證心真心切勿遠追尋了知自性原無礙雞犬全彰劫外音寄祖印法兄金菊籬邊濯露鮮蓼華江上月娟娟夜來夢度瀟湘雨誰謂迢迢隔水煙宗玄兄還南嶽貽詩留別次韻送之一聲毒塗鼓驚聞何處人逢不識君謾說於今成獨往五湖煙水儘殷勤和張權始居士萍寓有感四首堪嗟大夢似霜華邂逅雲萍即是家認得家時原不住一瓢一杖是生涯南湖煙雨漾高樓一色長天目共游好識曼殊最後句慧刀拈起截奔流大虛閃電不留停憎愛何須逐隊行識取娘生真面目肯教埋沒過平生學道原為究此心非圖名字挂叢林話頭參到忘心處不向他家壁上吟示錢牧齊夫人鴻鈞轉處露陽春好聽鶯啼緑柳陰驚起渠儂無背面一輪依舊落西林示錢復先夫人滾滾紅塵隊裏人莫將情念強疏親試看雪殞新晴後萬樹依然舊日春示孫孝若夫人璨若驪珠不假揮尋常日用露全機桃華浪裏春雷蟄撥轉機輪遍界輝示瞿道人痛棒三遭血濺飛新春不附舊時機電光石火能舒眼撒手懸巖獅子威與高夫人萬里青霄絶點塵一輪明月耀乾坤茫茫宇宙人無數幾箇如君開頂門四言示雪星道人不知最切知有成顛空印海水海印空天無缺無剩無中無邊機分銖兩位合正偏痛棒三頓肋下三拳父慈子孝本自天然如水投器器圓水圓五言與如心道者人謂公年老余謂公學小遇事如不知於己無煩惱一榻自翛然三心何處討悠悠棲物外兀兀超塵表大智自若愚大拙成真巧萬象本蕭蕭一靈常皎皎叉手告松筠誰為世間寶五言四句辭南嶽山茨和尚塔一片秋空淨南山草木深暮雲千嶂色何處不關心竹明月橫空影清風杳拂塵堅貞原有節虛白本無心六言四句示衆居士四偈六首大千劫火洞然此箇原來不壞誰知滿目青山盡是法身三昧指上豈能見月鏡中何用尋頭不道即心即佛便去騎牛覓牛假和地水火風未免生老病死寶藏人人現成何必遺金孫子幻影任歸露電寂心俱付寒灰直須休去歇去那管魔來佛來贈天游駱居士二首羡爾文章滿世卻從湘水沉之西江一口吸盡處處生涯大奇句句聖賢風雅言言佛祖婆心更有一顛白雪散作陽和滿林讚南嶽山茨和尚像者箇宗匠忒殺無狀獨踞南嶽峰頂冷地吞煙吐瘴龜毛拂子拈起驚人突出眼睛佛魔膽喪才涉擬議劈頭來動轉施為難測量多少平人受你活埋被我覷破藏身隱相咄休隱相無虛妄讎恨難消描來供養龍池萬如和尚像者老漢黃面皮不開口說菩提贏得一雙眼輸卻兩莖眉澗狹水流急山高月上遲祗要鯨鯢神變化滔天惡浪滿龍池大俞法兄騎牛小像兩鬢蓬鬆高騎白牯博徹斯文貫通今古滅卻臨濟正法眼踏殺玄沙一隻虎古鑑法兄像者漢生來孟浪動輒拈條白棒浸殺龍池水裏突出佛祖頭上禪流不用疑猜便是古鑑和尚自讚無中卻生有向外揚家醜不喫趙州茶寧呷曹山酒能令一喝下須彌山倒走問著生緣處白棒當頭摟超月優婆夷行樂圖不是僧兮不是尼六門面面鐵牛機當軒突出無回互午夜堂前月正輝黃夫人行樂圖者箇夫人知不知一身隨處露雙眉欲知叉手藏鋒句盡在憑闌不語時倪伯屏居士像贊峨冠博帶大坐當軒雷聲淵默邦家之瞻雖然現出宰官像長老之名四海傳書問寄興化沈居士貧衲於貴邑少緣不克久居與居士面商箇事悵甚泰州期中安靜僧舍頗潔無勞致念居士參究雖有箇入頭然向上一路猶太遠在須知古人一期方便直下無你回避處祗貴逴得便行不存軌轍始可捉他淨名龐老敗缺稍涉遲疑白雲萬里豈可今日明日存想究竟縱然悟去堪作甚麼古人云莫守寒巖異草青坐卻白雲終不妙惟居士自勉之與李三夫人前承道愛情出格外遙憶慈容宛如覿面泰州居止頗靜無勞分慮嘗欲道人看城東老母公案地與時遙不知近日體究如何山僧有箇頌子聊為舉似盍以良驥追風或借勢於鞭影也繡戶臨芝絶品評何須開宴待瓊英十分春色遊人醉一種天香透骨清向者提得便行可謂天上天下唯我獨尊不見有佛可成有衆生可度來去自由如鳥飛空豈不暢快平生耶倘其不然也須自加鞭策始得與李四夫人向臨貴邑未及一造高軒至今猶耿耿也道人智量過人辨才越衆正好從火宅以駕白牛入化城以躋寶所否則不異衣祕摩尼而借光東壁也惟道人淬礪精光猛利心志步步轉身頭頭脫體山僧雖有成風之手於道人分上總屬夏行冬令更有甚罏𩍁鉗錘哉時不待人伏唯珍重與式玉王居士雲峰雖隔百里明眼人何異覿面居士於日用想加精進矣雖然一聞便悟尚涉程途佇思停機白雲萬里事是恁麼事人須恁麼人若少留觀聽也須朝斯夕斯念念不間一朝迸裂始稱大事了畢方不孤負己靈而昂藏於天地間也近日上堂法語奉覽餘不備寄衡陽劉氏兄弟別來數載如電光中眨眼相似世事遷流更可知矣遙望家鄉又不知作何景況也貧衲竿木隨身逢場作戲楚水吳山殆將歷遍所謂天地與我同根萬物與我一體腳頭腳底橫三豎四那管通身泥水百結拖地法華禪師頌云屎臭薰天亦偶然法華爭敢為君宣鼻中若有通天竅一任橫行不著穿盡大地無不是箇清淨道場了無罣礙所念人人有一大事因緣在聖不增在凡不減迥脫塵根高超言象遇緣應物觸處圓成萬變千奇不離本際祗為情生智隔想變體殊於諸緣染濃如膠漆輪回六道無繇解脫貧衲每懷吾兄弟未能覿面提持得出苦海不得不如許葛藤聊申相為之誠伏惟各自努力珍重珍重又世人如石火電光眨眼即是來生時節不相饒光陰疾如駛祗如貧衲見參請者不論久參晚進無非全體大用覿面提持醍醐毒藥隨人領解盍為迷越裳之路聊作指南之車若是利根上智直下知歸安用貧衲饒舌為也正謂人人本具各各不無者道靈光時時獨露一涉言詮便成途轍衆兄弟皆是英靈漢子也須知有此段大事人生必要了明者不然生死到來前路茫茫無本可據憑何保得不入驢胎馬腹但願諦信無疑則一念回光便同本得那時方知我不汝欺吳楚地隔惟吾兄弟善忖度之與黃樵雲居士山野寓姑蘇有年每見縉紳居士參究此道者不是見地偏估便為知解籠罩真參實究者屈指全無昔日龐居士楊大年李駙馬輩皆操履真實見道穩密此等流亞無復再見前造高軒見居士行色匆匆未得盤桓為悵邇來宗乘似盛實衰惟居士現宰官身行法門事勘破自己日用不負靈山囑托凡遇師匠慎勿輕意放過須當取彼所長勵我所短則道學淵源自然透頂透底古人云學道如入大海轉入轉深良不誣也山野忝據法筵每念德薄智淺無益後進惟思衡嶽峰頂嘯月眠雲以消餘業了現報而已其餘又何慕哉使旋草率無任神馳與周雲卿居士向承賜顧蓬壁生輝造次登龍過辱寵優謝謝老居士夙具善根智量過人若究心此道應如泗洲見大聖不知有何世務紛紜于本分事膜不相關將謂世法佛法分作兩橛不見僧問歸宗如何是佛宗云吾言恐汝不信僧云和尚誠言安敢不信宗云即汝便是僧云如何保任宗云一翳在眼空華亂墜請看是何道理盍迎賓送客抱子弄孫至於折旋俯仰之間若能直下薦得即佛法尚不可得況世法耶山僧書至此不覺擲筆大笑且道笑箇甚麼言多去道轉遠惟居士就焚之雜著悼祖風辭一華五葉兮天下芬芳分宗裂派兮海內汪洋金丹點鐵兮信篤者化寶劍揮空兮命盡者亡棒喝交馳兮直釣獰龍針線綿密兮生陷大蟲惡水未潑兮俊鶻凌空鞭影擬動兮良馬追風今不夢見兮古人大全深可痛悼兮法幢傾顛心燈寢耀兮誰續焰焰祖脈壅塞兮誰決涓涓獅子窟中兮狐兔紛擾栴檀林內兮荊棘連綿受栴檀之薰炙兮吐伊蘭之臭氣披獅子之皮鞹兮噴野干之沫涎哀後生之蔑聞兮真詮教外悲軌持於疏鈔兮繩索重添醉佩衣珠兮甘馳貧里幼失恃怙兮傭作市廛流音律而忘返兮益進益狂捨定慧而投迷兮自漫自妨輕生死之不究兮殊為至愚昧心光之未明兮誠然可傷不久華屋兮盡作魔宮易見寶坊兮翻為利場世道衰微兮滔滔末法孰為大力兮再挈單傳不忘靈嶽之付囑兮愍孤露而護覆丕振少室之弘猷兮瀹狂瀾而溯源可令大法兮卷已復舒抑使心印兮彼彼共懸喃喃語當知學道如牧牛法慎勿縱緩犯人苗稼生死心當切世緣殊可罷看箇話頭心心無間當離憒鬧安處寂靜宜遠雜遝志圖見性宜寡言詞多語者賤宜省緣慮多事者亂無見小利壞良心無因小害損善念毋見人非退己善根毋自作孽退人道意毋以微善而不作毋以小惡而不禁聞善言當拱聽臨禍患當安詳見不平毋動氣遇侮慢毋動嗔處友必須乎淡絶交毋出惡聲聞過莫憚改聞諫當自醒非切己事莫往有益善者當行人家無伴慎勿久坐在處逢人不宜戲論當大事毋急卒遇小事毋輕忽無要緊事莫舉無利益事莫談好事宜先人後己過失宜責己恕人無訐露人隱事無障昧人美行毋為事難而辭毋為患難而退毋以妄身作業不可縱性壞事口不宜傳人非耳不宜聽人短見諍宜息見難急救重義疏財損己利物出言須和氣行事宜誠實問辨當虛己論事須達理捨戲玩具遠惡律儀莫親邪辟人莫習惡知解貧乏無苟求從容無妄費理不可自是事不可固執凡事宜方便為人無刻薄語默宜尊重舉止貴安詳當親良友宜擇明師見人須謙遜交易宜平穩奉己宜約待老宜寬在下者宜慈愛不慈愛同廢物在上者須孝敬不孝敬類犬馬當患道德不充毋以聲利自纍當治心於未萌毋順情以致亂究道研真老病應當益壯親師擇友曉夕不可憚勞切忌胸中存物虛室自然生白切莫意下染塵鏡清斷不匿髮當觀此身不久腐爛應不移時自心因塵而有無塵體亦無依觀身量等虛空則不見有身而為生死而生死亦同虛空安心還同法界則不見有心而為起滅而起滅亦同法界當信悟道在剎那不費纖毫力若假纖毫力即同有作意慢則心輕信微則志弱夙障深厚實難湊泊天下無愚人不納言者愚天下無真病不受藥者病病愈而藥不除其病轉深也言納而愚猶在其言不聖也然則余固非聖其言皆私淑諸聖也有心當世者不以人廢言可也竹拄杖頌儱侗一橛無枝無葉硬骨稜層七凹八凸其心雖空針拶不通凌霜傲雪不變其容生荊棘林長頑石壁無陰陽地卓卓安立用時活潑能縱能奪全生即殺全殺即活指西劃東勢若飛龍挑回明月撥轉虛空往往來來全憑渠力把住時聖凡乞命放行時瓦礫生色通身作用自天然倒弄橫拈許誰測示衆禪者偈欲渡生死海須乘般若舟一念回機處諸妄即時休妄盡心如如輪回始斷流般若因師悟刳心未足酬生佛本來齊迷悟兩分岐達法心開悟拒師原自迷一團世俗心豪無欽信倪祗責他長短不知己是非茫茫隨業識涉獵閒文字自心障自心非業成業地共師住千年不知佛法意誠哉知道難知己尤不易一中邪師毒萬劫縈桎梏擇師第一功參隨自勉勗形儀似端嚴浮情實諂曲扭捏投人意碔砆豈是玉本色人難得宛有凌霄勢面不阿附人心不藏異計不辨塵勞境寧知聖義諦任性逐情塵千生驢橛繫自誇心機巧能令萬事曉寧知障染心不是超凡表作善無豐約隨心成大小住相輪回生離塵生死了萬行得其宗菩提在掌中關捩無多子久長人可通清淨理不入濁惡心爭空業浪滔滔滾真機耿耿蒙身世暗推遷命根日剝削一旦無常至然後抱佛腳閻老實無情緊要隄防著莫謂死尚遠將此付高閣急處放些緩強處放些弱日用苟相應生死能自若了身心如幻即是大圓覺為報修行人是義應當學佛事為恆持禪人火擎火炬云精進持淨戒猶如護明珠一朝親撲落縱橫總是渠擲下云山僧為汝重指出一朵青蓮輝地爐為新玄道者火拈火炬喝一喝云玄來多少時也依舊腳跟立地有口祗解脫空到處逢場作戲等閒得路便還家樹倒藤枯如粉碎且道樹倒藤枯句歸何處攛炬云直下來也急著眼覷
