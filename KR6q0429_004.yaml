body:
  text: 侍者超遠記録詩偈五言八句南嶽山居雜詠澗底風來肅情空物物幽不聞車馬鬧遠卻世塵憂葉落知秋老林疏露瀑流忘機鷗與鷺相狎若相投其二門倩閒雲護清幽丈室臨野猿探果熱巢鳥入林深撇卻浮名網超然樂道心空空四句外得意芥投針其三靜看秋光好楓紅滿耳聲松濤聯鶴唳谷響答蟬鳴遊客衣冠古憨僧風度清舉頭空際望楚澤有餘英其四日出通身暖風來大地涼人心多障礙聖道獨揮揚白玉生成白黃金不煉黃古今無改變在在露真常其五坐對西窗下碧峰蒼翠排白雲峰頂去清風竹塢回山閣餘清夢溪松覆碧苔荒林無異味果熱鳥銜來其六拶到忘人處人忘法亦空兩忘俱寂滅萬有絶羅籠正入真三昧如斯號大雄含靈雖異象定慧理玄同其七亂石千峰裏危廬倚碧岑黃鶯鳴翠柳白鷺點芳林曲徑穿雲細荊扉落葉深幾番移住處山色亦沉吟其八世路風塵老歸休咬菜羹儉勤貧亦足戒愳禍終輕學自不欺始智依無事清書紳及銘座黽勉盡餘生其九幽鳥緡蠻處煙華映嶽容樹深偏見鹿寺遠不聞鐘竹徑分青靄泉飛挂碧峰無人知此況獨對萬年松其十拭目疏林望風煙節候殊秋聲千葉墜遠影一巢孤不避秋霜鴈驚飛夜月鳥庭前來又去幾度遣榮枯其十一高隱平生志今來住此山幻塵都覷破浮世漫相關石乳隨時汲藤花任意攀乾坤空浩大誰識此中閒其十二林壑晴雲鎖亭亭幾樹梅汲泉吟詠去採藥帶香回葉上寒山偈雲中般若臺杖藜隨所至石几布蒼苔其十三古剎清虛境停機問老翁山高月漸小源遠脈微通虎嘯千峰肅龍吟萬壑雄丹青為佇望繪入畫圖中其十四古樹蟠奇石清溪繞碧苔飯餘山鳥靜雲破鉢龍回壁老形如畫人間冷似灰三生如半日何處得愁來其十五紅葉都零落山泉覺有聲應知秋月朗不及夜燈明竹影掃階靜花閒映塢清松間拈野句長嘯萬峰鳴其十六巖老山房瘦閒僧許暫棲雲深天墜地影淡日沉西勞我烏藤杖看人白壁題悠悠清興永說偈對潺溪其十七疏狂難入世甘老白雲巔實際原無地清虛賴有天棲心空劫外拭目古崖前蘭若傍溪結隨時了幻緣其十八藤華飛石徑流水繞東津久與世人隔時來野鹿親縈縈深壑路杳杳大江濱嘯傲忘情處風和樹又春其十九苔砌溪邊路茆簷覆百花年來何甲子節至幾春華策杖臨高石傾瓶步淺沙猿聲歸洞晚和月弄煙霞其二十窗碧映清輝開門納翠微離霞孤鶴回繞石亂雲飛矮榻苔為席疏簾葉作衣斜陽西去遠倦鳥自知歸其二十一獨向山居老松門露兩乂書經集貝葉挂錫落藤華種竹開青徑穿林摘紫茶相逢塵外客秋信寄誰家其二十二瀑響決長河藤芽挂緑蘿推雲出岫杳掃徑落華多簷柳拖金線溪藤亂碧波晴明天氣暖凍解沒前坡其二十三葉落滿山黃茫茫匝地霜搜林番澗柳穿隙入山房池凍梅花吐空清鴈字狂野燒增烈焰風送晚煙香其二十四秋至梧先老涼生鴈早歸蛩聲依戶切水潦出途稀明月舒光皎孤雲抱雨飛夜來風過樹紅葉滿荊扉其二十五桂輪偏照野嵐氣滿幽林愛見澄清景恆持虛白心苔平趺坐穩風徑入林深老衲來相問焚香一鼓琴留別萍水應無定翻成萬里思黃花秋雨暮白雁楚江遲卓錫千山夢窮心浩劫詩偶然彈此曲何意使人知孟秋送行塞雁多南度翩翩遠送君此時看別路何處共斜曛調拂關山月思浮海國雲尺書如不吝千里寄殷勤其二紅樹霜橋別青蘿水寺期去來唯仗錫得失但稱詩細雨迷松徑孤煙結柳絲好隨梧葉信莫負落花時其三國亂猶飛錫天邊何處留朝雲排小閣夕雨上孤洲白業皈常住青燈說浪遊孤帆欸乃裏旦暮定中流仲秋留別煙水無停枻年來如自然林花邀副墨池草倩書玄有句非平仄無心任折旋吾今非孟浪作息信前緣其二自分非高遁行蹤任卷舒無心棲虎市有志愜鶉居暑氣消衣袂秋聲散牧漁雌黃隨衆口端不掩瑕瑜解制送禪者涼風方解制曉客萬峰行傳食蓴絲滑秋衣薜荔輕雲扶肩錫短月襯掌珠明江北江南事烽煙滿百城七言八句山居瞿曇昔日弄華枝金色顰眉事不疑七處徵心饒片舌八還辨見負雙眉貧兒除糞勞如此長者施珍苦若斯教外不須重注腳一肩擔荷更繇誰其二柳藏鸚鵡夕陽斜幽谷晴春實可誇林下風生閒虎豹澗邊水溢浴龍蛇敝廬草座雲為盍枯木蘿龕菌作華為喜者些窮快活兩肩破衲伴煙霞其三幾度臨磯下釣絲潭寒月皎罷施為坐箇蒲團忘歲月瞪雙冷眼學呆癡有林是處藏狐兔無窟何方隱豹羆利劍尋常當面擲那堪時刻不持危其四識得家珍不外求依然曲水繞山樓劈開臨濟三玄語看破天龍一指頭幾度清風嘶木馬半窗明月吼泥牛自從笑罷歸來後高枕松陰聽瀑流其五坐來石上卻清幽月皎長空雲已收人在夢中誰識夢蟬隨秋喚不知秋心灰豈羡蓮華國念淨何妨翡翠樓信道自身元是佛人間何事覓封侯其六威音那畔箇真傳顯露分明何用言要辨泥中原有刺須知法外本無門欲同赤腳波斯相休作癡毛捕影猿末後一機如舉似石人笑倒在溪源其七勞生汩汩事如何何不修真出愛河識得浮漚滅北海莫將幻夢戀南柯百年富貴金非少一旦無常土亦多煙雨臺高波浪滾塵中歲月易蹉跎其八耐盡松筠意未闌好將銀燭夜深看但教月畔疏星列擬聽風前落葉刪山壑樹搖如夢斷田園果熟已秋殘銀橋指度今宵漢錯怪雲深杓柄寒煙霞峰策杖遙登最上山真風須向翠巖攀世間濁質難相許雲外清游信自閒怪石欲飛形躍躍驚流直下響潺潺行來不覺幽玄處踏碎煙霞信步還神仙洞萬疊蒼黃鎖翠嵬山峰寂歷絶塵埃半溪影出清泉竹幾敶香飄碧澗梅暮雨濕侵藤下路斜陽光襯洞中苔從來不學長生術到此還思一溯洄彌阤峰彌陀祇在翠微間覿體西方絶往還自是獨尊無兩相擬思皈奉隔重關巍巍坐斷千巖石歷歷張開萬木顏更有拈來親切句華香鳥語絶追攀飛來船不識何人作此舟寥寥占斷楚江秋棹停水月巉巖伴帆卷林風石浪浮招得片雲橫谷口偶通一線過峰頭洞庭浩渺多生計透出煙波好順流觀音巖亂峰幽澗境非常鳥道縈回入梵堂奇石懸崖疑虎墮蒼藤倚樹若龍狂洞中有路通天竺谷外無塢隱道場優鉢華開何處地幾番風過寶林香天台寺踏破浮雲望彼蒼松濤深處石為梁千山月色侵人夢一樹梅花透塢香幽谷豈妨春信早懶雲寧解客情忙我從鳥道行將遍黃葉鳴爐欲沸湯九仙觀派派清流瀉翠橫九仙臺上掃花迎塵囂以謝年年遠花果時生日日春洞裏漁樵新別調蓬萊勝負舊棋聲請君更種桃千樹白鶴飛來兩翮輕擲鉢峰踏翻階級直凌空囊鉢全拋徹骨窮曾在靈山親授記故留衡嶽醒童蒙誰云更有通霄路唯信原無別樣功任是老盧將不去春風千載付山翁太陽泉引出峰頭噴未休太陽何處不隨流穿林渡海離塵網傲雪經霜得自由勢湧沖開千嶂碧津流吞卻一輪秋斗牛不動真常處宇宙無雙第一幽讓祖塔已上俱南嶽諸勝巍巍壁立示全身虎嘯龍吟果是真鼻孔撩天獨我望舌頭拖地幾人親金幢高據當軒令玉樹重敷劫外春七十餘峰俱坐斷寥寥千古卻如新中山大明寺芒鞋拄杖腳頭寬信步行來路不艱明敝高懸連褟淨清光返照逼窗塞兩廊素壁真堪畫一帶青山色可餐春去已知花柳瘦大家列坐是團欒寄慈法兄隱山獨宿孤峰值早春清高那許世相鄰情知格外忘人我直透玄關始得純奪境奪人全體用立賓立主獨精神別峰頭上遙相會誰道今人非昔人壽程弘陽五十已知四十九年事世路何如道路幽山色照開秦苑日水聲流出漢宮秋青雲瞥向塵中度白髮何須海外遊一念回光無量壽謾勞海屋又添籌元旦玩雪極目平沉大地通孤燈照映草堂中梅花一樹誰知白玉壁千峰我幸逢禪室飄來風說法香臺飛去鳥談空年年好景原無別眼界于今更不同志感勞勞車馬走風塵幸是當年埋照身壁立不行屠狗客懸巖豈坐釣魚人溪山瀟散心加靜雲月開明意自真萬事如棋何足問道緣心境幾番新寫懷道路崎嶇過便休閒觀世事水東流目窮天際空今古足躡雲端任去留泉石主人常並坐松花道者每同遊有時得句憑虛嘯勝與漁樵共唱酬次南嶽和尚臥病二首空谷寥寥獨掩扉為探心地卻忘機病身一任同松老瘦骨何妨與鶴肥識破浮生真夢幻好憑祖道逗光輝縛茆已遂煙霞志臥看閒雲自在飛其二林間長日意閒閒問疾無人日往還有法利生猶未了無心合道本非艱不因疏漏幽藏壑寧為清閒老臥山魔佛兩頭俱坐斷晴溪贏得步潺湲描山茨和尚真一見吾師相貌奇丹青未舉意先疑眉間霜劍光時透手內烏藤痛處追鼻孔未垂全道影髮毛才露識真儀當軒突出誠難辨那許時人問是誰禮南嶽山茨和尚塔亂雲堆裏事幽玄一塔千峰不記年像貌寧隨山色變語音豈借水聲宣松陰斷處光還潔花影重交體更鮮潭北湘南人不會玲瓏插出自摩天偶然作短髮蓬鬆披雪裘長年寂寞臥林丘松華漫煮青精飯霜葉寒燒黃蘗秋潦倒世情如蝶夢仳儷時事付春流砌蛩未識閒情思早向簷前訴冷愁泛沅湘登法海禪院深秋獨泛汨羅灣夾岸芙蓉醉玉顏緑葉紅英憐我老清風碧潦羡君閒沉湘舊恨應難洗弔古新篇豈易刪落落緬懷書不盡何當乘興叩玄關漢口倚樓望南嶽雪離山莫厭不相逢意足猶如萬里同一字懶題人相外半行猶寄汝心中眼前樓閣堆新粉鏡裏蓬茅理舊宮撥盡爐頭煨芋火寶華無數墮虛空望巴陵寶塔日暮湖天浩氣殷浪花堆裏鴈聲喧千峰遙落雲帆迥一塔孤危天籟閒幾處踏歌松影內數聲簫管木聲間持杯漫對西來爽倚遍斜陽獨破顏峽山掃林皋和尚塔孤光迥迥塔連巔幾陳風聲鳥語邊三瓣香拈蒸宇宙一杯茗獻薄雲煙斂衣就坐尊前哲叉手揚眉望後賢猶問箇中消息處橫山展竹淨明天次韻酬愧菴居士解脫場中共一家如君立志已堪誇心田剃去無明草覺樹開來智慧華坐斷洞中猿鳥道任從方外水雲賒何時得遂幽巖隱拍手溪頭笑落霞贈以貞道人世間同隊幾同修獨羡君能得自繇截斷情關如水冷了知苦海若雲浮襟懷灑落塵緣纍骨格英奇佛祖伴勘破箇中男女相乾坤何處不風流壽李夫人七十何必山邊與水邊閨中須信有神仙種桃閬苑三千歲茹蘗人間七十年別室幽蘭香發遠中庭丹桂蕊方妍白雲解得青山意萬里飛來擁壽筵壽金壇于居士六十甲子籌添又一回舌翻墳典得心裁一航煙水拂衣去五柳風塵解帶來高閣秋深生爽籟華堂木落見瓊臺縫紗帳外群賢列寧肯輸他漢世才壽黃夫人五十玉宇金風拂壽筵碧瞳青鬢已蘧年五華璀璨承綸寵三要通明見性圓自是松筠超物表一憑蘭桂秀庭前長春何用求方外箇裏舒眸繼祖田壽周雲卿居士六十山河世系還千戶江漢乾坤著此身抗節獨高洗耳客尋幽多伴避秦人蒼松白石披襟地彩袖青雲滿目春甲子不須論歲月煙霞詩酒興俱新壽再生禪兄五十坐斷三吳百億川神鋒凜凜耀當天期同海宇恆沙數獨露靈山面目全滿袖清風施好手半鉤明月接高禪慶君能得無生樂腦後圓明徹大千送樵雲黃宗伯遊南嶽旌旆翩翻彩仗鮮雲梯獨步陟層巔萬松深處丹霞寺千漲浮來馬祖田遙接文星鐘韻杳半登靈嶽梵音圓瀟湘滾滾皆桃李未識誰將衣鉢傳秋日過圓明寺賦贈爾初禪師不貪幽寂不辭艱野外茆堂可省顏求法人來浮古渡放生魚過落前灣鷗眠白水閒當牖草引清風靜掩關萬疊雲山皆拱坐鐘聲催處鴈聲還幽湖指息菴贈道明禪師且喜高棲近水邊眉開別是一壺天帆從門外分南北雲起村中遞後先喋喋漁歌醒午夢喃