body:
  text: 繼總禪師語錄序伏見西來衣缽大事因緣有以多為貴者如黃櫱所稱不是無禪祗是無師馬大師會下八十四人坐道場得正法眼者無幾人廬山歸宗是其一此因多而翻見少也有以少為貴者全部傳燈如大慧所囑付僅得彌光妙總兩人而妙總禪師一稱平江資壽尼一號無著道人為丞相蘇公頌孫女咨參諸老早入正信當大慧奉敕再主徑山宗風丕振臨濟中興而來往盤桓與張侍郎無垢馮給事濟川眉毛廝結於徑山方丈中者獨有無著道人宜大慧付偈有云臨機一一任天真世出世間無剩少我作一偈為證明四聖六凡盡驚擾從此響震諸方而同時有溫州淨居妙道禪師為延平尚書黃公裳女有開堂法語並見傳燈此因少而翻見多者也只今南楚繼總禪師毓生名公世族同積年真參實悟同龍池萬如和上記莂與徑山妙喜老人囑付同從上淵源徑山前有佛果龍池前有天童其為滴骨滴髓臨濟兒孫同是知繼總徽聲固足爭光無著為先後宗門兩大總持也迺繼總師之竿頭進步者在說法浩浩中還視無著道人實為得未曾有自花開南嶽果結禹門以來江北江南竿幡隨建橫擔楖栗到處踏毘盧頂上行向優缽曇邊現眼筋舌骨喝月拏雲塵說剎說熾然說無間歇說幾於石室盡寫金言草堂悉書貝葉矣吾檇李非無佛稱尊之地赤肉團上無位真人往往出現更喜象王一行狐蹤斷絕其為人天利益詎可思議哉即不慧抱影東皋得以佛法相見一聞師八齡時夙根猛利從外祖南贛中丞宋公禮足憨山肉祖機緣再聞高工部玄期公奉使衡陽時值乃祖蘇州刺史幻臣劉公耄耋得道刻期示寂同聲唧剝機緣直是無始劫來威音王那畔公案而師發通天竅展縮地符即此具見豹斑令人陡然浹背矣如許白紙黑字的的空谷足音可使截斷眾流亦可使乾坤函蓋應效菩提流支彈指讚歎無已仍作左行梵書流傳西土俾西土沙門東向遙禮聖人更應令楞嚴藏冊妙麗莊嚴添一重提魚籃賣笊籬應化神通大作略庶於慧燈普炤少分相應云爾順治丙申長至月望國子監司業兼掌祭酒事前戊辰二甲進士工部虞衡司郎中大理寺左寺副曹溪憨祖弟子福徵道一居士譚貞默槃談撰季總徹禪師語錄敘從古有言優曇缽華三千年一度現大善知識五百世許相逢且曇華作麼現知識作麼逢滿眼煙波難泊岸釣竿未舉早先知莫道世間無駿骨追風現有季法兄師生緣南楚姓劉適陳陳君宦西粵殞於非命師白簡鳴冤報仇雪恨即棄家學道參山茨和尚棒下知歸結茆衡嶽峰頭深蓄厚養透明今古具有古德氣概茨師圓寂單瓢隻杖泛湘江涉洞庭概然有南天台北五臺之遊埽祖塔探禹門機契龍池萬如和尚授記莂焉缾錫到處士紳仰慕四眾雲臻莫不延請弘揚法道棒喝交馳雷奔電掣說法利生度籌盈室會下多有省發者師不濫印焉嘗曰不二法門嚴戒律者已寡大千界內真參悟者益稀故師律已凜如嚙雪領眾肅若啣枚毫無假借不似當今宗匠亂搭東瓜印子妄囑匪人良足重也丙申秋日師來訪余出慧燈語錄讀之如食哀家梨令人爽口快心又如入山陰道中令人應接不暇又如杲日當空光芒閃爍令人不得正眼相覷余請付梓使有目者共睹曇華出現有識者咸欽知識相逢余興然作敘余懼白衣弁首無異佛頭著糞師曰老盧得法非僧相龐老通明豈離家不獲已視其語意則指月話月通教通宗口談筆談眼聾耳塞觀其機智則匝地清風三軍勇冠不圖打草且要驚蛇察其炤用則一聲哮吼狐狸膽落覿面相呈無形無影至若獨泛孤舟垂絲千尺遍遊江海擺撥鯨鯢是其氣魄也世法佛法同見龍潭虎窟交參夢中拈棒智海埋人是其作略也復為贊曰頭角完全不住行千山萬水覓知音盲人不解尋消息都盧落塹墮深坑嗣臨濟正法三十二世𨍏轢道人嚴大參題瑤天慧目耀古輝今性地覺華香郊馥閫是以森羅象景白晝鳴雞粉碎虛空青天霹靂架銕船於大海截斷紅塵翻玉浪於雄峰沖開碧落極底冰清骨格還他故物無邊彩絢風流原是當家此惟季總禪師足以當之余每過慧燈禪院見師具大人相而為說法一句當陽千峰落色機先者著列聖攢眉痛棒纔施血流遍地迥出毘盧之頂笑拈帝釋之華推倒南嶽峰吸盡龍池水驚起千年玄鶴斫卻青松蹋翻萬頃白雲行來碧嶂抓彩慶新羅俊鶻透網喜三聖金鱗跨神牛而坐斷十虛乘快風而游乎八極照若赤珠寶鏡鑑萬象以無私開如玉鎖金匙啟千門而洞曉放出屠龍手擲下駭雞犀四海波平看華鯨而吞吐九霄雲淨憑靈鳳以翱翔祗有恁般也大奇特天下太平余心暢快松陵弟子葉紹顒槃談撰自昔飲光紹拈華之旨大鑑肇分葉之傳闡化多方宗風震播統惟貫一紀則逾千迨金粟老人重光祖席振起凌夷臨濟兒孫獨滿天下今我季總和尚南楚發祥衡巒間氣夙生根利乘願力弘決志捨塵壯年絕俗斬葛藤而誅棘莽游智刃以無前抉羅網而破波濤示慧燈之普照始得省於南嶽繼嗣法於龍池楚水吳山雲蹤殆遍單瓢隻杖萍跡著奇凡所至止之鄉靡不皈投恐後歲在甲午師開堂於吾蘇橫塘慧燈禪院道風既被法雨同霑見者謂勝優曇爭歎重來古佛傲民稽顙外道傾心時節因緣迥超今古覿面則機鋒峻捷豎拂則意句新玄痛棒橫施獨軼千賢之隊眉毛揚起俯臨萬仞之岡洵哉盡大地為墨以虛空為量不足喻法道之弘廣也丙申秋杪師有事武林還訪𨍏轢嚴公於檇李機緣相契懇師出稿付剞劂氏用廣流通予承師命佐董是役不揣固陋僭引數言具眼難瞞恐徒為眼中著屑也重九後十日吳郡南山弟子張銖題於攜李寓齋自初祖來震旦暢演拈華之旨五傳至曹谿分二派別五宗而臨濟兒孫獨盛臨濟二十八世至笑巖寶寶傳幻有傳再傳天童悟悟傳今龍池萬老和尚為三十一世大闡宗風祖庭復振而大江以南踞猊座唱道者得人稱最盛如季總禪師家世名族生長富貴慧根猛利提起金剛王劍斬卻塵緣現真實相得度始依南嶽山茨和尚有省七載後和尚示寂慕兩浙三吳之道望次第參訖隨腰包躡屩到龍池入室無虛日遂復印可而屋北鹿谿西雞又實證蜜授於皮髓問矣即今化行大江南北皆以本分接人拈提向上侍者錄其語成帙余讀之知單傳直指埽絕枝蔓大機大用當體全彰是真有得於語言文字之外也而所謂大道不分男女相於茲益信棒頭有眼明如日於師益親捧是錄者須向己躬下追究勿在言句上咬嚼方不辜負季總禪師海陵鞠劬居士王相說謹撰眾護法請住蘇州慧燈禪院開堂啟伏以寶地初成山靈拱翠剎幢既建波色搖光楞伽屏列畫天然震澤潮通聲不寂非繇人傑曷稱勝緣恭惟季總大和尚禹門嫡派金粟親孫衡嶽降禎湘源毓秀履坤貞而輝分慧日躔婺野而祥覆慈雲悟圓澤之三生身前身後豎天龍之一指非佛非心杖挑萬里煙霞缽臥千群龍象喝聾三日遂使汗滴曹谿燈接五枝久已坐臨室壁錫飛江浙遏斷胥濤杯渡邗溝敷芬瓊萼誠震旦國之香城而閻浮提之華雨也某等身沉欲海識昧尸波借給孤祗園奉迎法駕掃維摩丈室仰庇宗風栴檀片片皆香吹開濁劫楊柳枝枝是露沛作津梁伏願卓彼法幢鋤茲福地一葦爰止繙圓覺而妙義疏宣雙樹相依隨方響而微言闡暢吐廣長舌標指見於西江明月發海潮音措安流於古渡橫塘願協人天望殷緇素臨楮無任翹切瞻依之至葉紹顒張王治王盛鼎李模周公軾葉倓黃孔昭金允治朱鎰陸世廉姚宗典沈文采許元溥姚宗昌嚴秪敬周起龍李楷周茂蘭陸時登陳元青周茂藻吳晉錫徐樹丕周茂萼范周黃自起申緒芳何兆清陸壽名何柄季總微禪師語錄目次卷一敘請啟上堂小參卷二示眾機緣法語行實卷三拈古頌古卷四詩偈讚書問雜著佛事
