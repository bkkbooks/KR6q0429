body:
  text: 侍者超祥記録示衆立秋日示衆梧桐一葉下雕闌剔起眉毛仔細看赤手承當無欠剩頭頭顯露祖師關且如何是祖師關擊拂子云一擊當陽成粉碎越水吳山一色寒示衆山僧許久屏卻咽喉唇舌一任諸人讚龜打瓦何故心不負人面無慚色今日無端被諸人推到者床子上要求開示教我説箇甚麼即得雖然事無一向不見道天地與我同根萬物與我一體叵耐百姓日用而不知且道過在甚麼處大衆道本無壅人心自昧昭昭於心目之間而取之弗及晃晃於色塵之內而捨之弗得愈隱愈露轉動轉寂光明烜赫迥脫情塵絲豪瞥起天地懸隔豎起拂子云還會麼若向者裏會得徹證無生法忍不妨睡正穩一任日輪高示衆師卓拄杖云足解履手解執耳聞聲目見色寒著衣飢進食豈是粧成皆同本得不間絲豪動念即隔所以道溪澗不改舊時聲黃華翠竹常年色足下豈有餘塵目前原無外物獨步毗盧頂上全披古佛肝膈問諸人瞥不瞥直饒見得木馬嘶風泥牛吼月撿點將來也是空裏浮華眼中金屑示衆生死海無邊當人自利涉欲識佛性義須知箇時節寒則普天普地寒熱則普天普地熱拈起慧劍兮劈破塵網提來鈯斧兮斫開鐵壁千賢萬聖覓無蹤五眼六通皆罔測徹見萬象森羅法法何曾是實不妨任意逍遙縱橫了無礙塞其或未然更聽一偈一年秋又一年秋眨眼俄驚雪滿頭道業未成何所賴人身一失實堪愁兩輪日月穿梭過三界輪回若輥毬可嘆世間癡種子今生錯過悔何求示衆若論宗門一事別無奇特所貴發勇猛心著堅固力痛念無常參明大事自然摸著諸佛鼻孔透過祖師關捩不到大休歇田地不肯息肩停轍方有少分相應無奈佛法衷微人心下劣罔知己靈不存正念此皆邪毒入心淺根薄福之流汝等諸人各宜精進將話頭如一座須彌山頓在面前忙間動靜觸不散蕩不開綿綿密密不斷不續參來參去鐵壁銀山自然嚗地不可坐在無事甲裏古人云莫止忘形與息心此箇難醫病最深直須提起吹毛利要剖西來第一義瞪開眼兮剔起眉反覆看渠渠是誰若人靜坐不用功何年及第悟心空此皆藥石之言切須記取中秋示衆颯颯西風落葉輕飄香丹桂發疏林世人盡愛中秋月驀豎拂子云未審誰能悟此心大衆祗如古人道不是心不是佛不是物且道畢竟是箇甚麼良久云眉毛剔起看方便月在青天水在瓶示衆既為僧須自勵收撿身心成法器學道真誠入聖流生死海中期汝濟苟圖衣食逞間遊浪蕩隨緣生邪計不若居家作俗人免他神算并人議空門物施主財為崇道業施將來未了復身還信施何能越得馬驢胎近賢智達庸鄙善念日增惡日止豪釐繫念成業因三塗苦報從茲起心地不明誓不休應期妙悟超凡類參隨一似活死人方得心空出三際若還不信我語言閻老無情君莫怪示衆學有內外事有緩急究宗達本曰內世諦學解曰外外所以當緩內所以當急急而行之於內則有證悟之實緩則置之於外則無岐路之迷今之學者不然醉詩文於莫返耽技藝而不回應赴為終身之業習誦為名利之資甚之則又有流於不可言者嗚呼學不究竟非學也僧不至道非僧也但有五德之名徒具六和之相益己之功既缺利人之德全虧辱此圓頂玷污方袍不識自心之何似焉知祖道之嘉模豈只辜負聖化抑且埋沒己靈既昧正因之路空招來世之愆況無常苦逼時不待人祗恐名利未遂而身先盡學問未通而命已亡費盡百端心力忽然一旦俱空良可悲夫故須篤志離舊刻期證悟梵行惟潔道業惟精庶不為生死魔軍之所管轄也苟不孜孜實學兀兀真參則無常卒至何以支撑後悔莫及請熟思之臘八示衆豎拂子召大衆云古今風月常然遐邇雲山鎮靜鵲噪鴉鳴鳥飛兔走雲開峰頂月波湛水中天便好端拱無為坐致太平野老謳歌帝力何有叵怪黃面老子説甚睹星悟道大驚小怪將謂有多少奇特依然祗道得箇一切衆生皆有如來智慧德相但以妄想執著不能證得震威一喝云當時若得者一喝管教他四十九年口似扁擔然雖如是出頭天外看誰是箇般人歲朝示衆爆飛千尺焰嚮遏萬重雲一氣洪鈞轉梅華幾點春新年頭佛法早已露布了也大衆古人道但得雪消去自然春到來且道雪向甚處去春從甚處來孰樞紐是孰橐籥是若向者裏著得隻眼不妨龍吟霧起虎嘯風生牢籠不肯住呼喚不回頭寒灰裏也須發焰枯木上直教生華其或未然捧看新曆日錯過舊時人元宵示衆十五日已前露柱燈籠盡説禪十五日已後土塊石頭皆𨁝跳正當十五日無位真人赤骨律十聖三賢總不知笑倒東村李八伯且道無位真人畢竟面目何似良久云燈燈影現無回互覿面相逢豈識渠示衆一九禪期眨眼間堂中禪客夢猶酣朔風凜凜通消息具足現前不用參離卻髑髏別處覓驢年終是受顢頇大衆且道如何是具足現前底衆無語卓拄杖云擬議直教心膽喪倚天長劍逼人寒示衆世界虛空總一體群靈萬象悉同宗此非耳目所能到心識忘時道自通大衆且道主山高案山低鶴脛長鳧脛短作麼生得同宗共體去良久云一氣不言含有象萬靈何處謝無私喝一喝示衆氣轉洪鈞陽回大地冰河發焰枯木生輝野鳥謳歌山華含笑正所謂般若法身頭頭顯現真如佛性處處昭彰果然直下承當便可超凡入聖其或未然不是一番寒徹骨爭得梅華撲鼻香新戒求開示卓拄杖云一法若有毗盧墮在凡夫萬法若無普賢失其境界於此明得盧行者高沙彌揚眉有分其或未然莫怪山僧葛藤驀召大衆云會麼參禪不持戒縱使廣智多聞未免被八風所動五欲所牽何能超出三界證大涅槃故經云聰明不能敵業乾慧豈免輪回受戒不參禪假饒六度齊修萬行俱備報感人天終須墮落當斯季運之時佛法澆漓人心淡薄在家出家罕有發淨信者間亦有之旋見退墮或值善知識開示勸令受戒參禪修因布福便百計推辭設若生死無常到來你還推辭得麼若推辭不得將此深心奉塵剎是則名為報佛恩更聽一偈一點圓明處處同包含法界等虛空棒頭可使三關透喝下能令五教通東澗水流西澗水南山焰起北山紅千江萬派無差別盡入如來性海中元宵示衆銀華徹夜爆竹驚天眨上眉毛程途萬千惟此一事實乞我一文錢踏翻水底月迸出火中蓮燈月交輝牽野興竿木隨身入市廛端午示衆今日五月五龍舟江上舞旗翻前夜風聲振去年鼓時節不相饒光陰不我與未明心地人須念生死苦緊緊握蒲劍挺挺騎艾虎勦六賊巢穴息三塗酸楚漫然不施功茫茫三界旅譬如隙中塵擾擾誰為主就陰息紛紜如繫駒伏鼠未滅眼中翳空華將復翥狂心不暫歇歇即止息所闃爾趨寂然卻攣而得僂不識常住心二邊墮見取於斯二無礙澤雉出籓宇十步一啄食百步一飲渚頡頏天地間無喜亦無怒爾我林下人有志超佛祖噇飯了打眠世事不聞睹無在無不在七徵自規矩無還無不還八辨自盲瞽合覺被覺瞞背塵為塵圍唯有一月真瞿曇未相許奪卻善財藥截斷文殊語此箇九還丹能瘳諸毒蠱吞卻如砒霜吐卻成蜜乳拼得窮性命佛祖不如汝於此蘧然醒杲日正當午於此若不醒錦鱗臥網罟驀拈拄杖卓一卓云謹白參玄人急急如律呂下座示衆新秧襯白鷺嫩柳啼黃鶯處處揚真諦於何逐色聲所以道即此見聞非見聞無餘聲色可呈君箇中若了無他事體用何妨分不分大衆見聞歷然因甚道非見聞聲色宛爾因甚道無聲色於此明得敶雲橫海上拔劍攪龍門於此不明打破六門關顯出毗盧印且六門關作麼生打得破去良久云一氣不言含有象萬靈何處謝無私卓拄杖下座機緣僧參問和尚那裏來師云要知山僧來處先喫三十拄杖僧便喝師便打雪中僧至師問南嶽峰頭雪擁三際姑蘇城裏行人絶蹤正恁麼時撥轉乾坤與我通箇消息僧云萬里長空一朝風月師云未在更道僧擬議師喝出葉季若居士問巴陵三轉語和尚作麼生會師和聲便喝士云如何是提婆宗陵云銀碗裏盛雪意旨如何師云來説是非者便是是非人士云如何是吹毛劍陵云珊瑚枝枝撑著月又作麼生師云非公境界士云祖意教意是同是別陵云雞寒上樹鴨寒下水又且如何師云也祗道得一半士云那一半請師不吝師云任從滄海變終不為君通士云和尚莫是末山再來師云又被風吹別調中問離心意識參出聖凡路學未審如何下手師打云向者裏會取問明心見性時如何師云正好喫棒無心道者呈偈有獨露孤峰頂上月之句師云即今月在甚處者拍香几師云者箇是檯子者云和尚莫謾某甲師云保福道底者擬議師喝出師茶次舉杯問高彙旃夫人云不觸不背喚作甚麼云自古重陽九月九師云放汝三十棒居士參師問尊年多少士云與和尚同年師云你道山僧年多少士云與某甲同年師云得恁麼顛倒士無語師云掠虛漢問第一句薦得堪與佛祖為師如何是第一句師云佛祖蹲何處第二句薦得堪與人天為師如何事第二句師云猛虎當途踞第三句薦得自救不了如何是第三句師云送君退步便還家他日相逢不相顧問如何是函盍乾坤句師放下拂子如何是截斷衆流句師拈起拂子如何是隨波逐浪句師云者箇因甚喚作拂子以貞道者參呈偈云堪笑從前枉用工離波覓水苦無窮如今親見當人面華在舊時紅處紅師云如何是汝當人面貞云和尚喫飯也未師云與汝甚交涉貞云分別不少師云囫圇吞箇棗貞無語師便掌次日呈南泉三不是頌師接得問云是箇甚麼貞云昨日被掌至今背脊猶疼師云死了燒了又作麼生貞擬對師便喝復示頌云覓心不得誰為佛觀佛無蹤誰是心去此二途能見徹兩眉依舊可憐生問有時一喝如金剛王寶劍如何是金剛王寶劍師云殺活不知何太險請君莫犯上頭鋒有時一喝如踞地獅子如何是踞地獅子師云突出巖前風凜洌野干何處匿形蹤有時一喝如探竿影草如何是探竿影草師云釣絲千尺垂江海浮定金鱗有與無有時一喝不作一喝用如何是一喝不作一喝用師云至化難逃天子令九韶齊奏六宮還優婆夷參師問參甚麼話頭婆云萬法歸一師云一歸何處婆拜下捏師足一下師云學來底婆云和尚莫壓良為賤師指淨瓶云因甚喚作淨瓶婆擬議師打出問德山上堂巖頭云且喜老漢會末後句如何是末後句師云不辭向你道恐你逢人亂説僧云某甲不説請和尚道師云罕逢穿耳客多見刻舟人問如何是奪人不奪境師云松下雙扉冷不扃一龕金像照清燈如何是奪境不奪人師云眠雲野鹿驚殘夢落澗瀰猴墜折藤如何是人境兩俱奪師云庭前樹色秋來減檻外泉聲久不聞如何是人境俱不奪師云吾今獨坐磐陀石午夜無雲月一天儒者見師問云大師曾習儒業否師云四海五湖王化裏大都緇素要分明云畢竟還尊釋門師云千峰勢到嶽邊止萬派聲歸海上消云道教中如何師云一自黃龍勘破後誰能不煉汞中金儒作禮而去問青州布衫重七斤意旨如何師云多少人提揭不起僧云提不起時如何師云至今混入在塵埃復示頌云金針玉線縫難就密密鋼刀剪不開千手大悲提不起至今混入在塵埃問如何是賓中賓師云狹路相逢無回避到門且喫趙州茶如何是賓中主師云山色溪光明祖意鳥啼華笑悟真機如何是主中賓師云雪覆萬峰晴月夜暗香浮出嶺南梅如何是主中主師云軒轅寶鏡當臺照任是蚩尤也斷魂賓主已蒙師指示臨濟宗乘事若何師云攪亂乾坤成至化未容擬議斬全身云真善知識師云識甚好惡問昔日僧問趙州親見南泉是否云鎮州出大蘿蔔頭意旨如何師云情知你吞吐不下問金牛每至食時舁飯桶作舞大笑云菩薩子喫飯來意旨如何師云不是飽餐人不知僧後問長慶慶云大似因齋慶讚又問大光未審因齋慶讚意旨如何光作舞僧禮拜光云你作麼生會僧亦作舞光云野狐精此意如何師云字經三寫烏焉成馬僧參師問住何寺僧云白雲菴師云雲散後菴在甚麼處僧擬議師掌云打野榸漢二居士參師問一士云什麼物恁麼來士無語師云山僧罪過一士云路逢劍客須呈劍師云試借劍看士繞禪床師劈脊便打士擬進語師又打士禮拜師云一對無孔鐵錘𨍏轢道人偕徐敬可居士過訪道人指士云此位遍參知識底師云參底事作麼生士無語師云將謂將謂士云嚴道人塗汙人師云他已沒量罪過法語示葉季若居士祖師門下直捷單提貴乎全身擔荷稍涉遲疑便不堪了也不見陸亙問南泉龐蘊參馬祖一撥便轉何等痛快何等直捷彼既丈夫我亦爾豈肯讓伊獨賢哉頃承老護法不忘靈山付囑光顧法席一接見問便知根器不凡靈骨夙具然身居富貴宿習偏深雖有金剛種子莫不為之汩沒矣但當全身靠倒不顧危亡挺身直入忽然㘞地一聲乃知從前作用總是無礙法門不惟勘破龐蘊諸老直饒歷代祖師天下老和尚齊立下風有分示申漢培居士居士夙具般若深智早年知有此事然不得實受用者患在聰明太過於古宿機語上得些理路便為了當殊不知縱有入處不過途路之樂耳要須懸崖撒手一回方始受用得古人言句著如來偈云即今認取主人翁山野不覺失笑何故不見道認著依然還不是況以生滅心測度如來無上知見唐喪光陰無益有害古人云毫釐有差天地懸隔直須猛著精神透出重關始得示函盍禪人師家垂手如石火電光眨上眉毛白雲萬里直須坐斷十方橫身宇宙眼盍乾坤口吞佛祖冰凌上走馬劍刃上橫身一機一語如珠走盤納須彌於芥孔擲大千於方外縱橫在我殺活繇誰應須如是始有衲僧氣概若祇逡逡巡巡淈淈𣸩𣸩依稀光影有甚了期山野恁般語話太煞和盤托出且道托出箇甚麼卓筆云分明記取示高彙旃夫人入海不避蛟龍信利在江海也入山不懼虎兕信利在山陵也世諦且爾況學道乎然學道參禪豈有他術邪不過穩辦一信字耳華嚴經云信是道元功德母信能必到如來地古德云欲超生死必須妙悟妙悟匪他惟自信耳盍生死如雪妙悟如日日出而雪自消無明是暗妙悟是明明來則暗自謝以此觀之非信無繇悟入非信安能久固今道人既具信根但當發勇猛心著精進力譬如遠客還故鄉久久行去自然到家不見昔日世尊棄王宮入雪山六年參究一朝睹星忽大悟云奇哉一切衆生皆具如來智慧德相皆因妄想執著不能證得道人向者裏一覷便透不妨與世尊同一受用苟或不然二六時中切莫放過示錢叔嘉夫人我祖師門下無一法與人不過教人信取目前自己而已道人既見山僧挂箇選佛牌便好單刀直入掇取巍科自知眉毛橫眼上鼻孔大頭垂佛語祖言豈得已哉若稍留欣厭便成大病所謂不離幻妄而證真常者良可味也示冰繼二禪人此事如青天白日無絲豪障礙直下了得便平貼貼地古人云道箇覿體現成早是埋沒汝了也明心見性早是委曲汝了也立地成佛早是鈍置汝了也若向佛祖未屙已前薦得猶是鈍漢那堪向他豚橛子上橫咬豎嚼有甚交涉所以道祗為分明極翻令所得遲所以垂一言半句止要截斷人心意識摟空人生死窟使他懸崖撒手脫體無依今時人生死心不切世情事太熟動轍心意識先行自作障難愛有理路處入有義味處鑽殊不知理路義味上博量得來暫時途路之樂轉眼即沒交涉況明眼人前祗博一笑今與汝道大事未明必須猛著精彩將本參話拌命提撕功積力久時節若至其理自彰腳跟頓斷紅絲線舌上潛消十字文翻身一躑倒跨三腳驢子向舜若多神鼻孔內眼睛裏橫出豎入管教得大自在豈不慶快平生乎勉旃勉旃示如心如性二禪人欲脫生死當求妙悟欲求妙悟必須參究提起疑情念念無間自有豁然時節若執坐以為工夫何異守株待兔是以古人有打車打牛之詰坐佛殺佛之呵黑山鬼窟之責生坐死臥之譏故知行住坐臥動止忙間皆可做工夫但坐中斂念易得寧靜然禪亦非斂念取靜參得故曰欲識佛性義諸法從緣生若能對境無心雖終日擾擾何曾動著一絲豪故無事於心則智顯無心於事則理明理明則物物頭頭何取何舍智顯則念念心心何妄何真盍以境之通塞繇心之迷悟何與於物哉龐公云難難難十石油麻樹上攤龐婆云易易易百草頭邊祖師意靈照云也不難也不易飢來喫飯困來睡汝等看他三人有甚奇特處不妨試簡點看若簡點得出到方丈裏與山僧通箇消息示黃君略夫人修行學道皆有悟門不可盲修瞎學虛喪天日必欲明此無上妙道也須具大信心發大勇猛立大志願把生死二字貼在額頭上不得向意根下卜度單提一句無義味話真參實究參來參去參到百尺竿頭無進步處不顧危亡拼命一拶直得虛空粉碎大地平沉便見盡十方世界是自己全身自己全身是十方世界庭前柏樹子麻三斤乾矢橛青州布衫鎮州蘿蔔乃至千七百則一串穿卻雖然到者裏始好喫山僧痛棒在其或未然有寒暑兮促君壽有鬼神兮妒君福示項翰林夫人禪學者悟門也非四禪八定五度九次之別惟洞明心性了脫生死得大自在者之門徑也古人云我此門中不論禪定解脫祗圖見性又云參禪須求妙悟若不妙悟無由出離生死大海今時道流謬以口耳哄弄閨閣不求妙悟而脫生死祗益滑稽謗大般若以致埋沒己靈辜負先聖可不哀邪汝既皈依山僧希求大道急將明昧兩岐與我一時坐斷單提一箇話頭直下不起二念猛著精神一踏到底千聖齊立下風萬靈咸希至化豈不慶快生平也哉嗟乎驢鞍橋本非阿爺下頷水泡沫豈是輪王頂髻參須真參悟要實悟至發明後更能操守保護乃為道器示張黃甫徐仰齋二居士山河大地明暗色空日月星辰森羅萬象迷者認為外物悟者消歸自己一切時中若能無事於心無心於事自然物我一如隨處自在不見僧問風穴語默涉離微如何通不犯穴云常憶江南三月裏鷓鴣啼處百華香居士若向者裏開得隻眼不但世法佛法一念圓融即風穴老子亦一時收下到者裏山河大地明暗色空日月星辰森羅萬象向甚麼處著居士試道道看示葉素旃居士常住真心覿體全彰擬思即錯動念即乖十方三世了無差別知此者謂之大智行此者謂之大行示此者謂之大慈廣此者謂之大悲百千三昧皆由此出奈何衆生迷此蔽慧日於欲海埋智劍於塵封處處貪著頭頭滯礙豈知水月鏡像而無體空華陽焰以非真莫道凡情不可執直饒聖號亦是假居士但當掀翻窠臼撒手承當直登解脫之場大播廣長之舌攪長河為酥酪變大地作黃金始不負山僧之厚望也勉之示鎮江賀夫人寶劍眉間挂摩尼掌上陳玻璃拈起處栗棘一時吞會得箇中意日午打三更一椎擉瞎摩醯眼鼻孔依然搭上唇參示超震禪人雲收雨過氣肅天高須彌盍北斗日月杖頭挑不是摘蘆江上客千山萬水路迢迢踢翻福建飛鳶嶺踏斷天台滑石橋有意氣時添意氣不逍遙處也逍遙示張超霞道人鶯老華殘春已去風清竹翠夏還來一輪寶鑑當空照萬里長空絶點埃正與麼時打失香嚴鼻孔刺瞎靈雲眼睛且道眉毛還有罪過也無幾度黑風翻大海未曾聞著釣舟傾示王士英夫人忙間靜鬧之中密密提撕本參不可絲豪間斷日久時至工夫自然成片驀頭打破疑團便見世尊拈華迦葉微笑是甚麼宛脫丘然雖如是且道千七百則畢竟明得甚麼邊事千峰勢到嶽邊止萬派聲歸海上消示湛水道人初參人祗貴死盡偷心參箇話頭如銅墻鐵壁要鑽鑽不透相似日用中如貓捕鼠如雞抱卵工夫自行逼拶一拶拶到結角羅紋處忽得㘞地一聲方與此事相應若初參人便有許多哆哆喃喃底説話於自己分中有何所益徒障悟門為害不少如來偈本有光明云云且問你底光明在甚麼處那箇是你大廳堂莫道道不得直饒道得一句正是頭上安頭不見僧問趙州狗子有佛性也無州云無你看者無字上著得你底光明麼著得你底大廳堂麼何不朝朝暮暮如透銅墻鐵壁去如貓捕鼠去如雞抱卵去一朝山門前佛殿後撞破露柱也不知示沈夫人橫按莫邪山河大地風颯颯單提正令魔軍外道絶行蹤衝開萬里青霄椎碎銀山鐵壁處處盡彰華藏界頭頭獨露法王身無邊福智莊嚴萬億神通顯現於此薦得不假外求原是本有其或未然更為你葛藤一上不見舍利弗入城見月上女出城舍利弗問云大姊何處去女云如舍利弗與麼去舍利弗云我方入城汝方出城何得言如我與麼去女云諸佛弟子皆依大涅槃而住是否舍利弗云是女云諸佛弟子既依大涅槃而住而我亦如舍利弗與麼去於斯明得埋沒己靈於斯不明辜負先聖且道畢竟如何雲在嶺頭間不徹水流澗底大忙生示明心明性二道者昔日維摩室有散花天女機辨縱橫得大無礙舍利弗問何不轉卻女身天女云我從十二年來求女人相了不可得當何所轉須臾間天女忽變作舍利弗以舍利弗變作天女卻問舍利弗何不轉卻女身舍利弗云我今不知此身當何所轉須臾天女運大神力彼此轉變還復如故為是神通妙用為是法爾如然於此若明回天關轉地軸促無量劫為一日延一日作無量劫男子身中從定入女子身中從定出女子身中從定入男子身中從定出非同非異無自無他其或未然一把柳絲收不得和煙搭上玉闌干咄示超禪超聖舉七賢女玩賞春一女云我與姊同遊尸陀林諸姊云尸陀林皆是死尸臭穢有何可觀一女云汝但同遊中間自有奇特到彼見諸死尸一女云尸在這裏人在甚麼處一女云作麼作麼諸姊諦觀悉皆悟道感天帝釋散花供養女曰空中散華者何人答云某天帝釋見諸姊悟道特來散華供養凡諸姊所需我皆供給姊曰我家四事七珍悉皆具足唯愛三般物一要無根樹子一株二要無陰陽地一片三要叫不響山谷一所帝釋云一切珍寶我皆有之此三般物而我實無女喚云帝釋帝釋應諾女云汝道無是甚麼帝釋遂隱去師云水底木人吹鐵笛雲邊石女織金梭三般物是祖翁物何必忙忙賤賣他雖然如是且道畢竟歸于何處一月影臨千澗水片雲風度萬重山示歸望之居士望之即見覓之無形擬進無路欲退無門搓不成團劈破渾圇咦為甚如此色色原非色聲聲不是聲五蘊山頭曉四大總皆真自是不歸歸便得五湖四海任橫行咄更須透過者重關始得行實師住朝陽普度菴王試玉王士英居士同本菴大衆等禮懇師説行實師固辭請之再四乃就方丈據座云靈龜無卦兆空殼不勞鑽丹鳳縈金網趨霄恐不及況我無狀不知修道而無可修成佛而無可成不妨依實供通要亦不堪取則諸仁者某係湖廣衡州府人族姓劉父諱善長母宋氏一夕父夢老僧索住處許之母遂有脤懷十有二月既而胎鳴者三於萬曆丙午年八月十八日夜出生時有白光燭室燈月如蔽衆皆謂奇幼不喜茹葷哺一葷即吐稍長好看儒書佛經厭處塵繁痛念生死懇父捨身出家父不允後許宇陳氏不數年陳君遊宦沒即造菴修像作福田邊事朝夕靜坐喜看戒律決志出家逐日訪問知識忽一日訪海天老師見案上有山茨和尚刻行南嶽禪燈録讀之透不過古德宗旨問云山茨和尚潛隱何處天云結廬煙霞峰即往見之尚問汝在家作何功德某云念佛尚云念佛又爭得某禮拜云特求和尚開示尚云汝參一口氣不來向何處安身立命某領之從此發起疑情一日尚以禪關策進命某看開卷見鵝湖大師示衆云莫祗忘形與死心此箇難醫病最深直須提起吹毛利要剖西來第一義便問如何是西來第一義尚打一棒云向者裏會取某即歸家閉關或行或坐七晝夜目不交睫一日見古録上有百年三萬六千日返覆元來是者漢之語便知諸根行業皆幻化不實日用尋常了無他事作偈云有物不生不滅無形非聖非凡晝夜相隨去住胡為冷坐寒巖作書并偈呈似和尚尚回示云偈語雖佳不離記憶揣摸非親證親悟之言明眼人見之不值一笑某開覽不覺寒毛卓豎冷汗浹背行坐參究四十九晝夜不倦忽然呆去三四時不見有身心器界偶聞雷迅如在網羅中跳出相似當下不疑銀山鐵壁一時粉碎作偈云八萬門頭一箇關一關本是絶遮闌驀遭霹靂頂門開堂上家親竟日間呈和尚尚頷之一日荊紫峰無學大師至某開關禮接設齋次學問汝二六時中做甚麼工夫某云日間一食夜來一覺學云知汝不空過某云多謝和尚證明後上峰見南嶽山茨和尚芡問云聞汝請學兄是否某云是尚云他向你道甚麼某舉前話尚云汝祗解問人不解自己分中事某云自己祗如此尚云如何是你自己某便喝尚云喝後如何某禮退次日又入室尚與天童源流某接得問云一代傳一代傳箇甚麼尚云汝忘卻那某云也須問過尚良久某云達磨西來直指人心見性成佛後分二派五宗各立門戶各有旨趣五宗二派且不問如何是德山棒尚云你那裏見德山來某顧拄杖師便打示偈云覿面為提持全施殺活機棒頭彰正眼痛處好思惟時年三十四歲和尚與祝髮受具分付住靜杜絶俗眷往來一日問世尊未離兜率已降王宮未出母胎度人已畢此意如何尚云家家門前火把子某呈頌云來中去兮去中還玉樹橫枝四海間黑漆鉢盂添箇柄拈來擊碎祖師關尚閲之默然又問薰風自南來殿閣生微涼此意如何尚云攔腮與汝掌某亦呈頌云薰風南來有何極殿閣微涼祗自知晴蝶逐香翻上下辰雞閲日唱東西從今覷破真消息萬象森羅展笑眉尚徵云如何是汝自知處某云空懸一片月爍破萬重山尚云山既破汝即今腳跟立在甚麼處某云翻身一擲騰霄漢管教鼻孔自撩天尚擲還頌稿某便出從茲和尚住山與南元寺垂示法語二十則尚去後某覺離師太早亦欲出山適和尚示寂南元復請靈骨入山併追寫道儀建塔畢乃于庚寅年六月初八日禮辭和尚骨塔下衡山至武昌遭寓處失火和尚手澤俱焚行李皆燼漢口道俗請住菩提菴次年三月始到金陵四月底鎮江鶴林寺見牧雲和尚尚問云汝來作甚麼某云特來親覲和尚牧云見我那某云昔日聞風今朝覿面牧云覿面後如何某云眉毛在眼上牧云除了者裏又作麼生某一喝牧云那裏學者虛頭來某云瞞和尚不得牧云我有三十棒恕汝遠來某禮拜出到夾山見箬菴和尚尚問莫是拜南嶽和尚底季總麼某云是箬云拋家亂走作麼某云輝騰今古爍破乾坤箬云正是拋家亂走某云騰身獨立太虛外鼻孔從教塔上唇箬云我有三十棒未到你在某拂袖便出箬至慶山杭州某皆隨侍朝夕參請越三月餘辭上龍池見本師和尚掃幻老師翁塔圓戒尚問你是湖廣那一府某以手打圓相呈起尚云還別有伎倆麼某喝尚云再喝喝看某云爭奈舌頭在某甲口裏尚云舌頭雖在口爭奈道不出某云未問已前道過了也尚云曾親近甚麼人來某云南嶽茨和尚尚云他即今在甚麼處某云一輪皎潔孤峰頂爍破龍池徹底清尚打云間言語某云輕輕曳杖龍池過惹得傾湫倒嶽來尚復打某云也是醉後添杯尚云喚作棒即錯某禮退一日入方丈尚問昔日巖頭道大小德山未會末後句如何是末後句某云和尚萬福尚云此是最初句某云聽師分別一日入方丈尚云除卻言詮道一句看某鳴指一下尚云還有麼某云大無厭生便出一日請和尚設戒上堂某出問猛虎入山逢獬豸蛟龍出水避蜈蚣手提三尺龍泉劍誰敢當頭觸萬峰當頭一句即不問萬峰獨露是如何尚云試借劍看某云半空伸出拿雲手奪得麗龍領下珠尚云空開大口某以手呈珠勢云請師高著眼尚云背後底又作麼生某一喝尚云亂喝某云大似日下孤燈便歸衆次日辭尚欲歸南嶽尚云下路人學道甚難回山之念且止老僧完你底事可在下路度衆遂付某源流拂子某力辭欲歸尚云江南住住好適興化一師請住普度菴即命往焉此上一番絡索山僧不著便被諸人帶纍了也且道諸人還知鼻孔落在山僧手裏也無良久拈拄杖卓一卓云若無舉鼎拔山力千里烏騅不易騎衆歡喜作禮而退
